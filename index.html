<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>get-cool.ru</title>
    <style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0a0a10;color:#d4d4d8;min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:20px}
.home{text-align:center;padding-top:12vh}
.logo{font-size:clamp(36px,8vw,52px);font-weight:900;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{color:#888;margin:8px 0 20px;font-size:14px}
.sbox{display:flex;align-items:center;background:#13131d;border:2px solid #1e1e2e;border-radius:28px;padding:6px 10px;max-width:600px;margin:0 auto}
.sbox:focus-within{border-color:#60a5fa}
.sicon{width:38px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sicon svg{width:20px;height:20px;fill:#888}.sbox:focus-within .sicon svg{fill:#60a5fa}
.sinp{flex:1;padding:10px;font-size:16px;background:transparent;border:none;color:#fff;outline:none}
.sinp::placeholder{color:#555}
.sclr{width:28px;height:28px;border-radius:50%;border:none;background:transparent;color:#666;font-size:18px;cursor:pointer;display:none}
.sclr.on{display:block}
.btns{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.btn{padding:10px 22px;border-radius:22px;font-size:13px;cursor:pointer;border:none;font-weight:600;transition:.2s}
.btn1{background:#1e1e2e;color:#ccc}.btn1:hover{background:#2a2a3a}
.btn2{background:linear-gradient(135deg,#a78bfa,#60a5fa);color:#fff}.btn2:hover{opacity:.9}
.hint{font-size:11px;color:#555;margin-top:12px}.hint span{color:#888;cursor:pointer;margin:0 3px;text-decoration:underline}.hint span:hover{color:#60a5fa}
.res-page{display:none;padding-top:16px}
.top-bar{display:flex;align-items:center;gap:10px;padding-bottom:10px;border-bottom:1px solid #1e1e2e;margin-bottom:12px;flex-wrap:wrap}
.logo-sm{font-size:20px;font-weight:900;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer}
.sbox-sm{display:flex;align-items:center;background:#13131d;border:1px solid #1e1e2e;border-radius:22px;padding:2px 6px;flex:1;min-width:140px}
.sicon-sm{width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sicon-sm svg{width:16px;height:16px;fill:#888}
.sinp-sm{flex:1;padding:6px;font-size:13px;background:transparent;border:none;color:#fff;outline:none}
.sclr-sm{width:22px;height:22px;border-radius:50%;border:none;background:transparent;color:#666;font-size:14px;cursor:pointer;display:none}
.sclr-sm.on{display:block}
.top-btn{padding:7px 14px;border-radius:16px;font-size:11px;cursor:pointer;border:none;font-weight:600}
.top-btn.ai{background:linear-gradient(135deg,#a78bfa,#60a5fa);color:#fff}
.filters{font-size:10px;color:#888;margin-bottom:8px}.filters label{cursor:pointer;display:flex;align-items:center;gap:4px}.filters input{display:none}
.cb{width:14px;height:14px;border:2px solid #444;border-radius:3px;display:inline-flex;align-items:center;justify-content:center}
.cb svg{width:8px;height:8px;fill:#4ade80;display:none}.filters input:checked+.cb{border-color:#4ade80;background:#4ade80}.filters input:checked+.cb svg{display:block}
.stats{font-size:10px;color:#666;margin-bottom:6px}.list{display:flex;flex-direction:column}
.card{cursor:pointer;padding:10px 0;border-bottom:1px solid #1e1e2e;transition:.2s}
.card:hover{background:#ffffff03}.card:hover .ct{text-decoration:underline}
.cu{font-size:10px;color:#888}.bd{font-size:7px;padding:1px 5px;border-radius:5px;font-weight:700}
.bd.g{background:#22c55e18;color:#4ade80}.bd.y{background:#f59e0b18;color:#fbbf24}
.ct{font-size:15px;color:#60a5fa;margin:3px 0}.cs{font-size:11px;color:#888;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bover{position:fixed;inset:0;background:#000e;z-index:100;display:none;flex-direction:column}
.bover.on{display:flex}.btop{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#13131d;border-bottom:1px solid #1e1e2e}
.burl{flex:1;padding:7px 12px;background:#0a0a10;border:1px solid #1e1e2e;border-radius:18px;font-size:11px;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bbtn{width:30px;height:30px;border-radius:50%;border:none;background:#1e1e2e;color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.2s}
.bbtn:hover{background:#333}.bbtn.x{background:#f8717120;color:#f87171}.bbtn.x:hover{background:#f8717140}
.bframe{flex:1;width:100%;border:none;background:#fff}
.aiover{position:fixed;inset:0;background:#000e;z-index:200;display:none;align-items:center;justify-content:center}
.aiover.on{display:flex}
.aiwin{width:100%;max-width:500px;height:72vh;background:#13131d;border:1px solid #1e1e2e;border-radius:16px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.aihead{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #1e1e2e;background:#1a1a28}
.aititle{font-weight:800;font-size:16px;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.aiclose{width:28px;height:28px;border-radius:50%;border:none;background:#f8717120;color:#f87171;cursor:pointer;font-size:14px;transition:.2s}
.aiclose:hover{background:#f8717140}
.aichat{flex:1;padding:12px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.aimsg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:12px;line-height:1.4;animation:fi .3s;white-space:pre-line}
.aimsg.u{align-self:flex-end;background:linear-gradient(135deg,#60a5fa,#a78bfa);color:#fff;border-bottom-right-radius:4px}
.aimsg.b{align-self:flex-start;background:#1e1e2e;border-bottom-left-radius:4px}
.aimsg.b a{color:#60a5fa;text-decoration:underline;cursor:pointer}
.aitype{align-self:flex-start;padding:8px 12px;background:#1e1e2e;border-radius:12px;display:flex;gap:3px}
.aitype span{width:5px;height:5px;background:#888;border-radius:50%;animation:tb 1.4s infinite}
.aitype span:nth-child(2){animation-delay:.2s}.aitype span:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,80%,100%{transform:scale(1);opacity:.4}40%{transform:scale(1.3);opacity:1}}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.airow{display:flex;gap:8px;padding:10px 14px;border-top:1px solid #1e1e2e;background:#1a1a28}
.aiinp{flex:1;padding:10px 12px;background:#0a0a10;border:1px solid #1e1e2e;border-radius:18px;color:#fff;font-size:12px;outline:none;transition:.2s}
.aiinp:focus{border-color:#a78bfa}
.aisend{width:34px;height:34px;border-radius:50%;border:none;background:linear-gradient(135deg,#a78bfa,#60a5fa);color:#fff;cursor:pointer;font-size:14px;transition:.2s}
.aisend:hover{opacity:.9}.aisend:disabled{opacity:.4}
.foot{text-align:center;font-size:9px;color:#333;padding:10px;margin-top:auto}
@media(max-width:600px){.aiwin{height:85vh;border-radius:12px}}
</style>
</head>
<body>
    <div class="app">
    <div class="home" id="home">
        <h1 class="logo">get-cool</h1>
        <p class="logo-sub">Поиск без рекламы. Только суть.</p>
        <div class="sbox" id="sboxMain">
            <div class="sicon" id="siconMain"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></div>
            <input class="sinp" id="siMain" placeholder="Введите запрос..." autocomplete="off">
            <button class="sclr" id="sclrMain">×</button>
        </div>
        <div class="btns">
            <button class="btn btn1" id="searchBtn">🔍 Поиск</button>
            <button class="btn btn2" id="aiBtnHome">🧠 Cool AI</button>
        </div>
        <div class="hint"><span data-q="кофе">кофе</span> · <span data-q="новости">новости</span> · <span data-q="погода">погода</span></div>
    </div>
    <div class="res-page" id="resPage">
        <div class="top-bar">
            <span class="logo-sm" id="logoSm">get-cool</span>
            <div class="sbox-sm" id="sboxSm">
                <div class="sicon-sm" id="siconSm"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></div>
                <input class="sinp-sm" id="siSm" placeholder="Поиск..." autocomplete="off">
                <button class="sclr-sm" id="sclrSm">×</button>
            </div>
            <button class="top-btn ai" id="aiBtnRes">🧠 AI</button>
        </div>
        <div class="filters"><label><input type="checkbox" id="showAds" checked><span class="cb"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>Сайты с рекламой</label></div>
        <div class="stats" id="stats"></div>
        <div class="list" id="list"></div>
    </div>
    <div class="foot">get-cool.ru</div>
</div>
<div class="bover" id="bover">
    <div class="btop"><div class="burl" id="burl"></div><button class="bbtn" id="brel">↻</button><button class="bbtn x" id="bclose">✕</button></div>
    <iframe class="bframe" id="bframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</div>
<div class="aiover" id="aiover">
    <div class="aiwin">
        <div class="aihead"><span class="aititle">🧠 Cool AI</span><button class="aiclose" id="aiclose">✕</button></div>
        <div class="aichat" id="aichat"><div class="aimsg b">Привет! Я Cool AI. Могу искать информацию, погоду, новости и просто общаться. Спроси что угодно!</div></div>
        <div class="airow"><input class="aiinp" id="aiinp" placeholder="Спросите..." autocomplete="off"><button class="aisend" id="aisend">➤</button></div>
    </div>
        </div>
        <script>
const $=id=>document.getElementById(id);
const home=$('home'),resPage=$('resPage'),siMain=$('siMain'),siSm=$('siSm'),showAds=$('showAds'),list=$('list'),stats=$('stats');
const bover=$('bover'),bframe=$('bframe'),burl=$('burl'),aiover=$('aiover'),aichat=$('aichat'),aiinp=$('aiinp'),aisend=$('aisend');
let searching=false;

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function tgl(inp,clr){clr.classList.toggle('on',inp.value.length>0)}

async function doSearch(q){
    if(searching||!q)return;q=q.trim();if(!q)return;
    searching=true;list.innerHTML='';stats.textContent='Ищем...';
    let results=[];
    try{const r=await fetch(`https://ru.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*&srlimit=15`);const d=await r.json();if(d.query?.search)d.query.search.forEach(p=>results.push({url:`https://ru.wikipedia.org/wiki/${encodeURIComponent(p.title.replace(/ /g,'_'))}`,title:p.title,snippet:(p.snippet||'').replace(/<\/?[^>]+(>|$)/g,''),clean:true}));}catch(e){}
    try{const r=await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&no_html=1&t=gc`);const d=await r.json();if(d.AbstractURL)results.push({url:d.AbstractURL,title:d.Heading||q,snippet:d.AbstractText,clean:false});if(d.RelatedTopics)d.RelatedTopics.forEach(t=>{if(t.FirstURL)results.push({url:t.FirstURL,title:t.Text.split(' - ')[0],snippet:t.Text,clean:false})});if(d.Results)d.Results.forEach(r=>{if(r.FirstURL)results.push({url:r.FirstURL,title:r.Text.split(' - ')[0],snippet:r.Text,clean:false})});}catch(e){}
    const seen=new Set();const all=results.filter(r=>{if(!r.url?.startsWith('http')||seen.has(r.url))return false;seen.add(r.url);return true});
    const sorted=showAds.checked?all:all.filter(r=>r.clean);const final=sorted.slice(0,20);
    stats.textContent=`Найдено: ${final.length}`;list.innerHTML=final.length?'':'<div style="text-align:center;padding:40px;color:#888">Ничего не найдено</div>';
    final.forEach(r=>{const c=document.createElement('div');c.className='card';c.innerHTML=`<div class="cu">${esc(r.url.replace(/^https?:\/\//,'').split('/')[0])} <span class="bd ${r.clean?'g':'y'}">${r.clean?'✓':'⚠'}</span></div><div class="ct">${esc(r.title)}</div><div class="cs">${esc(r.snippet||'')}</div>`;c.addEventListener('click',()=>openBrowser(r.url));list.appendChild(c)});
    searching=false;
}

function openBrowser(u){bover.classList.add('on');burl.textContent=u;bframe.src=u}
$('bclose').addEventListener('click',()=>{bover.classList.remove('on');bframe.src=''});
$('brel').addEventListener('click',()=>{bframe.src=bframe.src});

function openAI(){aiover.classList.add('on');aiinp.focus()}
function closeAI(){aiover.classList.remove('on')}
function addMsg(t,p){const m=document.createElement('div');m.className='aimsg '+p;m.innerHTML=t;aichat.appendChild(m);aichat.scrollTop=aichat.scrollHeight}
function showType(){const d=document.createElement('div');d.className='aitype';d.id='aitype';d.innerHTML='<span></span><span></span><span></span>';aichat.appendChild(d)}
function hideType(){const t=$('aitype');if(t)t.remove()}

function makeLinksClickable(text){
    return text.replace(/(https?:\/\/[^\s]+)/g,'<a onclick="event.stopPropagation();document.getElementById(\'bover\').classList.add(\'on\');document.getElementById(\'bframe\').src=\'$1\';document.getElementById(\'burl\').textContent=\'$1\'">$1</a>');
}

async function sendAI(){
    const t=aiinp.value.trim();if(!t)return;aiinp.value='';addMsg(esc(t),'u');showType();aisend.disabled=true;
    try{
        const wm=t.match(/погода\s+в?\s*(.+)/i)||(t.toLowerCase().includes('погода')?['',t.replace(/погода\s*/i,'').trim()||'Москва']:null);
        if(wm){
            const r=await fetch(`https://wttr.in/${encodeURIComponent(wm[1])}?format=j1&lang=ru`);
            const d=await r.json();const c=d.current_condition[0];
            hideType();addMsg(`🌤 <b>${wm[1]}</b>: ${c.temp_C}°C, ${c.weatherDesc[0].value}, ветер ${c.windspeedKmph} км/ч, влажность ${c.humidity}%`,'b');
            aisend.disabled=false;return;
        }
        const greetings={привет:'Привет! Как дела?',как дела:'Отлично! А у вас?',как тебя зовут:'Я Cool AI — помощник get-cool.ru.',кто ты:'Я Cool AI. Ищу информацию, погоду, новости.',что ты умеешь:'Могу искать в интернете, показывать погоду, отвечать на вопросы и просто общаться.'};
        const q=t.toLowerCase().replace(/[?.,!]/g,'');
        if(greetings[q]){hideType();addMsg(greetings[q],'b');aisend.disabled=false;return}

        const r=await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(t)}&format=json&no_html=1&t=gc`);
        const d=await r.json();hideType();
        if(d.AbstractText&&d.AbstractText.length>20)addMsg(makeLinksClickable(d.AbstractText.substring(0,400)+(d.AbstractURL?'\n🔗 '+d.AbstractURL:'')),'b');
        else if(d.RelatedTopics?.length){
            let a='Вот что нашлось:\n';
            d.RelatedTopics.slice(0,5).forEach((t,i)=>{const url=t.FirstURL||'';a+=`\n${i+1}. ${t.Text.split(' - ')[0].substring(0,80)}${url?'\n🔗 '+url:''}`});
            addMsg(makeLinksClickable(a),'b');
        }else addMsg('Пока не знаю. Спросите иначе.','b');
    }catch(e){hideType();addMsg('Ошибка соединения.','b')}
    aisend.disabled=false;
}

function goToResults(q){home.style.display='none';resPage.style.display='block';siSm.value=q;tgl(siSm,$('sclrSm'));doSearch(q)}
function goHome(){home.style.display='';resPage.style.display='none';list.innerHTML='';stats.textContent=''}
$('logoSm').addEventListener('click',goHome);
$('siconMain').addEventListener('click',()=>{const q=siMain.value.trim();if(q)goToResults(q)});
$('searchBtn').addEventListener('click',()=>{const q=siMain.value.trim();if(q)goToResults(q)});
siMain.addEventListener('keydown',e=>{if(e.key==='Enter'){const q=siMain.value.trim();if(q)goToResults(q)}});
$('siconSm').addEventListener('click',()=>{const q=siSm.value.trim();if(q)doSearch(q)});
siSm.addEventListener('keydown',e=>{if(e.key==='Enter'){const q=siSm.value.trim();if(q)doSearch(q)}});
document.querySelectorAll('.hint span').forEach(s=>s.addEventListener('click',()=>goToResults(s.dataset.q)));
showAds.addEventListener('change',()=>{const q=siSm.value.trim();if(q)doSearch(q)});
$('aiBtnHome').addEventListener('click',openAI);$('aiBtnRes').addEventListener('click',openAI);
$('aiclose').addEventListener('click',closeAI);aisend.addEventListener('click',sendAI);
aiinp.addEventListener('keydown',e=>{if(e.key==='Enter')sendAI()});
aiover.addEventListener('click',e=>{if(e.target===aiover)closeAI()});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeAI();bover.classList.remove('on');bframe.src=''}});
tgl(siMain,$('sclrMain'));siMain.addEventListener('input',()=>tgl(siMain,$('sclrMain')));
$('sclrMain').addEventListener('click',()=>{siMain.value='';tgl(siMain,$('sclrMain'))});
tgl(siSm,$('sclrSm'));siSm.addEventListener('input',()=>tgl(siSm,$('sclrSm')));
$('sclrSm').addEventListener('click',()=>{siSm.value='';tgl(siSm,$('sclrSm'))});
</script>
</body>
</html>
