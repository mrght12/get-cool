<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>get-cool.ru</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,sans-serif;background:#0a0a10;color:#d4d4d8;min-height:100vh}
        .app{max-width:900px;margin:0 auto;padding:0 20px;min-height:100vh;display:flex;flex-direction:column}
        .home{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-bottom:15vh}
        .logo{font-size:56px;font-weight:900;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
        .logo-sub{font-size:15px;color:#888;margin-bottom:24px}
        .sbox{display:flex;align-items:center;background:#13131d;border:2px solid #1e1e2e;border-radius:28px;padding:6px 10px;width:100%;max-width:600px;transition:.25s}
        .sbox:focus-within{border-color:#60a5fa}
        .sicon{width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%}
        .sicon svg{width:22px;height:22px;fill:#888}
        .sbox:focus-within .sicon svg{fill:#60a5fa}
        .sinp{flex:1;padding:10px 6px;font-size:17px;background:transparent;border:none;color:#fff;outline:none}
        .sinp::placeholder{color:#555}
        .sclr{width:34px;height:34px;border-radius:50%;border:none;background:transparent;color:#666;font-size:20px;cursor:pointer;display:none;align-items:center;justify-content:center}
        .sclr.on{display:flex}
        .btns{display:flex;gap:12px;margin-top:20px}
        .btn1{padding:10px 24px;background:#13131d;border:1px solid #1e1e2e;border-radius:22px;color:#ccc;font-size:14px;cursor:pointer}
        .btn1:hover{background:#1a1a28}
        .btn2{padding:10px 24px;background:linear-gradient(135deg,#a78bfa,#60a5fa);border:none;border-radius:22px;color:#fff;font-size:14px;cursor:pointer;font-weight:600}
        .hint{font-size:12px;color:#555;margin-top:16px}
        .hint span{color:#888;cursor:pointer;margin:0 3px}
        .res-page{display:none;flex:1;flex-direction:column;padding-top:18px}
        .res-page.on{display:flex}
        .top-bar{display:flex;align-items:center;gap:12px;padding-bottom:12px;border-bottom:1px solid #1e1e2e;margin-bottom:14px;flex-wrap:wrap}
        .logo-sm{font-size:24px;font-weight:900;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer}
        .sbox-sm{display:flex;align-items:center;background:#13131d;border:1px solid #1e1e2e;border-radius:24px;padding:3px 8px;flex:1;min-width:200px}
        .sbox-sm:focus-within{border-color:#60a5fa}
        .sicon-sm{width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer}
        .sicon-sm svg{width:18px;height:18px;fill:#888}
        .sinp-sm{flex:1;padding:8px 4px;font-size:14px;background:transparent;border:none;color:#fff;outline:none}
        .sclr-sm{width:28px;height:28px;border-radius:50%;border:none;background:transparent;color:#666;font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center}
        .sclr-sm.on{display:flex}
        .ai-btn{padding:8px 16px;background:linear-gradient(135deg,#a78bfa,#60a5fa);border:none;border-radius:20px;color:#fff;font-size:12px;cursor:pointer;font-weight:600;white-space:nowrap}
        .filters{display:flex;gap:6px;margin-bottom:10px;align-items:center;font-size:11px;color:#888}
        .filters label{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none}
        .filters input{display:none}
        .cb{width:15px;height:15px;border:2px solid #444;border-radius:3px;display:flex;align-items:center;justify-content:center}
        .cb svg{width:9px;height:9px;fill:#4ade80;display:none}
        .filters input:checked+.cb{border-color:#4ade80;background:#4ade80}
        .filters input:checked+.cb svg{display:block;fill:#fff}
        .stats{font-size:11px;color:#666;margin-bottom:10px}
        .list{display:flex;flex-direction:column;gap:16px;padding-bottom:30px}
        .card{display:flex;gap:12px;cursor:pointer}
        .card:hover .ct{text-decoration:underline}
        .cu{font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px;display:flex;align-items:center;gap:6px}
        .bd{font-size:8px;padding:1px 6px;border-radius:6px;font-weight:700}
        .bd.g{background:#22c55e18;color:#4ade80}.bd.y{background:#f59e0b18;color:#fbbf24}
        .ct{font-size:18px;color:#60a5fa;margin-bottom:3px}
        .cs{font-size:13px;color:#888;line-height:1.5}
        .bover{position:fixed;inset:0;background:#000e;z-index:100;display:none;flex-direction:column}
        .bover.on{display:flex}
        .btop{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#13131d;border-bottom:1px solid #1e1e2e}
        .burl{flex:1;padding:8px 14px;background:#0a0a10;border:1px solid #1e1e2e;border-radius:20px;font-size:12px;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .bbtn{width:34px;height:34px;border-radius:50%;border:none;background:#1e1e2e;color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
        .bbtn:hover{background:#333}.bbtn.x{background:#f8717120;color:#f87171}
        .bframe{flex:1;width:100%;border:none;background:#fff}
        .aiover{position:fixed;inset:0;background:#000e;z-index:200;display:none;align-items:center;justify-content:center}
        .aiover.on{display:flex}
        .aiwin{width:100%;max-width:650px;height:85vh;background:#13131d;border:1px solid #1e1e2e;border-radius:16px;display:flex;flex-direction:column;overflow:hidden}
        .aihead{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #1e1e2e}
        .aititle{font-weight:800;font-size:20px;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .aiclose{width:36px;height:36px;border-radius:50%;border:none;background:#f8717120;color:#f87171;cursor:pointer;font-size:18px}
        .aichat{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
        .aimsg{max-width:82%;padding:12px 16px;border-radius:16px;font-size:13px;line-height:1.5;animation:fi .3s}
        .aimsg.u{align-self:flex-end;background:linear-gradient(135deg,#60a5fa,#a78bfa);color:#fff}
        .aimsg.b{align-self:flex-start;background:#1e1e2e}
        .aitype{align-self:flex-start;padding:12px 16px;background:#1e1e2e;border-radius:16px;display:flex;gap:4px}
        .aitype span{width:6px;height:6px;background:#888;border-radius:50%;animation:tb 1.4s infinite}
        .aitype span:nth-child(2){animation-delay:.2s}.aitype span:nth-child(3){animation-delay:.4s}
        @keyframes tb{0%,80%,100%{transform:scale(1);opacity:.4}40%{transform:scale(1.3);opacity:1}}
        @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .airow{display:flex;gap:10px;padding:14px 20px;border-top:1px solid #1e1e2e}
        .aiinp{flex:1;padding:12px 16px;background:#0a0a10;border:1px solid #1e1e2e;border-radius:24px;color:#fff;font-size:14px;outline:none}
        .aisend{width:42px;height:42px;border-radius:50%;border:none;background:linear-gradient(135deg,#a78bfa,#60a5fa);color:#fff;cursor:pointer;font-size:18px}
        .foot{text-align:center;font-size:10px;color:#333;padding:12px;margin-top:auto}
        @media(max-width:600px){.logo{font-size:40px}.top-bar{gap:8px}.logo-sm{font-size:20px}.aiwin{height:92vh;border-radius:12px}}
    </style>
</head>
<body>
    <div class="app">
        <div class="home" id="home">
            <h1 class="logo">get-cool</h1>
            <p class="logo-sub">–Я–Њ–Є—Б–Ї –±–µ–Ј —А–µ–Ї–ї–∞–Љ—Л. –Ґ–Њ–ї—М–Ї–Њ —Б—Г—В—М.</p>
            <div class="sbox" id="sboxMain">
                <div class="sicon" id="siconMain"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></div>
                <input class="sinp" id="siMain" placeholder="–Т–≤–µ–і–Є—В–µ –Ј–∞–њ—А–Њ—Б..." autocomplete="off">
                <button class="sclr" id="sclrMain">√Ч</button>
            </div>
            <div class="btns">
                <button class="btn1" id="searchBtn">–Я–Њ–Є—Б–Ї</button>
                <button class="btn2" id="aiBtnHome">рЯІ† Cool AI</button>
            </div>
            <div class="hint"><span data-q="–Ї–Њ—Д–µ">–Ї–Њ—Д–µ</span> ¬Ј <span data-q="–љ–Њ–≤–Њ—Б—В–Є">–љ–Њ–≤–Њ—Б—В–Є</span> ¬Ј <span data-q="–њ–Њ–≥–Њ–і–∞">–њ–Њ–≥–Њ–і–∞</span></div>
        </div>

        <div class="res-page" id="resPage">
            <div class="top-bar">
                <span class="logo-sm" id="logoSm">get-cool</span>
                <div class="sbox-sm" id="sboxSm">
                    <div class="sicon-sm" id="siconSm"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></div>
                    <input class="sinp-sm" id="siSm" placeholder="–Т–≤–µ–і–Є—В–µ –Ј–∞–њ—А–Њ—Б..." autocomplete="off">
                    <button class="sclr-sm" id="sclrSm">√Ч</button>
                </div>
                <button class="ai-btn" id="aiBtnRes">рЯІ† Cool AI</button>
            </div>
            <div class="filters"><label><input type="checkbox" id="showAds" checked><span class="cb"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>–°–∞–є—В—Л —Б —А–µ–Ї–ї–∞–Љ–Њ–є</label></div>
            <div class="stats" id="stats"></div>
            <div class="list" id="list"></div>
        </div>
        <div class="foot">get-cool.ru ¬Ј –І–Є—Б—В—Л–є –Є–љ—В–µ—А–љ–µ—В ¬Ј 2026</div>
    </div>

    <div class="bover" id="bover">
        <div class="btop">
            <button class="bbtn" id="bback">вЖР</button><button class="bbtn" id="bfwd">вЖТ</button><button class="bbtn" id="brel">вЖї</button>
            <div class="burl" id="burl"></div>
            <button class="bbtn" id="bclean">вЬ®</button><button class="bbtn x" id="bclose">вЬХ</button>
        </div>
        <iframe class="bframe" id="bframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    </div>

    <div class="aiover" id="aiover">
        <div class="aiwin">
            <div class="aihead"><span class="aititle">рЯІ† Cool AI</span><button class="aiclose" id="aiclose">вЬХ</button></div>
            <div class="aichat" id="aichat"><div class="aimsg b">–Я—А–Є–≤–µ—В! –ѓ Cool AI вАФ –≤–∞—И –њ–Њ–Љ–Њ—Й–љ–Є–Ї. –Ч–∞–і–∞–є—В–µ –ї—О–±–Њ–є –≤–Њ–њ—А–Њ—Б.</div></div>
            <div class="airow"><input class="aiinp" id="aiinp" placeholder="–°–њ—А–Њ—Б–Є—В–µ —З—В–Њ-–љ–Є–±—Г–і—М..." autocomplete="off"><button class="aisend" id="aisend">вЮ§</button></div>
        </div>
    </div>

    <script>
        const $=id=>document.getElementById(id);
        const home=$('home'),resPage=$('resPage'),siMain=$('siMain'),sclrMain=$('sclrMain'),siSm=$('siSm'),sclrSm=$('sclrSm'),showAds=$('showAds'),list=$('list'),stats=$('stats');
        const bover=$('bover'),bframe=$('bframe'),burl=$('burl'),aiover=$('aiover'),aichat=$('aichat'),aiinp=$('aiinp'),aisend=$('aisend');
        let searching=false,bhist=[],bidx=-1;

        const CLEAN=['wikipedia.org','habr.com','github.com','stackoverflow.com','arxiv.org','gitlab.com','developer.mozilla.org','openstreetmap.org','archive.org','pypi.org','npmjs.com','react.dev','vuejs.org','svelte.dev','codepen.io','freecodecamp.org','khanacademy.org','leetcode.com','proton.me','signal.org','eff.org','cloudflare.com','fast.com','caniuse.com','sqlite.org','redis.io','digitalocean.com','vercel.com','netlify.com','replit.com','jsfiddle.net','getbootstrap.com','tailwindcss.com'];
        function isClean(u){try{const h=new URL(u).hostname.replace('www.','');return CLEAN.some(c=>h===c||h.endsWith('.'+c))}catch{return false}}
        function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
        function tgl(inp,clr){clr.classList.toggle('on',inp.value.length>0)}

        siMain.addEventListener('input',()=>tgl(siMain,sclrMain));
        sclrMain.addEventListener('click',()=>{siMain.value='';tgl(siMain,sclrMain);siMain.focus()});
        siSm.addEventListener('input',()=>tgl(siSm,sclrSm));
        sclrSm.addEventListener('click',()=>{siSm.value='';tgl(siSm,sclrSm);siSm.focus()});

        function goToResults(q){home.style.display='none';resPage.classList.add('on');siSm.value=q;tgl(siSm,sclrSm);doSearch(q)}
        function goHome(){home.style.display='';resPage.classList.remove('on');list.innerHTML='';stats.textContent='';siMain.value='';tgl(siMain,sclrMain)}
        $('logoSm').addEventListener('click',goHome);

        async function doSearch(q){
            if(searching||!q||!q.trim())return;q=q.trim();searching=true;list.innerHTML='';stats.textContent='–Я–Њ–Є—Б–Ї...';
            let results=[];
            try{const r=await fetch(`https://ru.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*&srlimit=12`);const d=await r.json();if(d.query?.search)d.query.search.forEach(p=>results.push({url:`https://ru.wikipedia.org/wiki/${encodeURIComponent(p.title.replace(/ /g,'_'))}`,title:p.title,snippet:(p.snippet||'').replace(/<\/?[^>]+(>|$)/g,'')}));}catch(e){}
            try{const r=await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&no_html=1&t=gc`);const d=await r.json();if(d.AbstractURL)results.push({url:d.AbstractURL,title:d.Heading||q,snippet:d.AbstractText});if(d.RelatedTopics)d.RelatedTopics.forEach(t=>{if(t.FirstURL)results.push({url:t.FirstURL,title:t.Text.split(' - ')[0],snippet:t.Text})});if(d.Results)d.Results.forEach(r=>{if(r.FirstURL)results.push({url:r.FirstURL,title:r.Text.split(' - ')[0],snippet:r.Text})});}catch(e){}
            if(results.length<5){[{url:'https://ru.wikipedia.org',title:'–Т–Є–Ї–Є–њ–µ–і–Є—П',snippet:'–°–≤–Њ–±–Њ–і–љ–∞—П —Н–љ—Ж–Є–Ї–ї–Њ–њ–µ–і–Є—П.'},{url:'https://habr.com',title:'–•–∞–±—А',snippet:'IT-—Б–Њ–Њ–±—Й–µ—Б—В–≤–Њ.'},{url:'https://github.com',title:'GitHub',snippet:'–†–∞–Ј—А–∞–±–Њ—В–Ї–∞.'},{url:'https://rbc.ru',title:'–†–С–Ъ',snippet:'–Э–Њ–≤–Њ—Б—В–Є.'},{url:'https://vc.ru',title:'VC.ru',snippet:'–С–Є–Ј–љ–µ—Б.'}].forEach(d=>{if(!results.find(r=>r.url===d.url))results.push(d)})}
            const seen=new Set(),clean=[],ads=[];results.forEach(r=>{if(!r.url?.startsWith('http')||seen.has(r.url))return;seen.add(r.url);r.isClean=isClean(r.url);(r.isClean?clean:ads).push(r)});
            let sorted=showAds.checked?[...clean,...ads]:clean;sorted=sorted.slice(0,20);
            stats.textContent=`–Э–∞–є–і–µ–љ–Њ: ${sorted.length} (вЬУ —З–Є—Б—В—Л—Е: ${clean.length})`;
            list.innerHTML=sorted.length?'':`<div class="empty" style="text-align:center;padding:40px;color:#888"><div style="font-size:40px">рЯФН</div><p>–Э–Є—З–µ–≥–Њ –љ–µ –љ–∞–є–і–µ–љ–Њ</p></div>`;
            sorted.forEach(r=>{const c=document.createElement('div');c.className='card';c.innerHTML=`<div style="flex:1"><div class="cu">${esc(r.url)}<span class="bd ${r.isClean?'g':'y'}">${r.isClean?'вЬУ –І–Є—Б—В–Њ':'вЪ† –†–µ–Ї–ї–∞–Љ–∞'}</span></div><div class="ct">${esc(r.title)}</div><div class="cs">${esc(r.snippet||'')}</div></div>`;c.addEventListener('click',()=>openBrowser(r.url));list.appendChild(c)});
            searching=false;
        }

        function openBrowser(u){bover.classList.add('on');burl.textContent=u;bframe.src=u;bhist=bhist.slice(0,bidx+1);bhist.push(u);bidx=bhist.length-1}
        function closeBrowser(){bover.classList.remove('on');bframe.src='';bhist=[];bidx=-1}
        $('bclose').addEventListener('click',closeBrowser);
        $('bback').addEventListener('click',()=>{if(bidx>0){bidx--;const u=bhist[bidx];burl.textContent=u;bframe.src=u}});
        $('bfwd').addEventListener('click',()=>{if(bidx<bhist.length-1){bidx++;const u=bhist[bidx];burl.textContent=u;bframe.src=u}});
        $('brel').addEventListener('click',()=>{bframe.src=bframe.src});
        $('bclean').addEventListener('click',()=>{burl.textContent='–Ю—З–Є—Й–µ–љ–Њ';bframe.src='about:blank'});

        function openAI(){aiover.classList.add('on');aiinp.focus()}
        function closeAI(){aiover.classList.remove('on')}
        $('aiBtnHome').addEventListener('click',openAI);$('aiBtnRes').addEventListener('click',openAI);
        $('aiclose').addEventListener('click',closeAI);
        aiover.addEventListener('click',e=>{if(e.target===aiover)closeAI()});
        document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeAI();closeBrowser()}});

        function addMsg(t,p){const m=document.createElement('div');m.className='aimsg '+p;m.textContent=t;aichat.appendChild(m);aichat.scrollTop=aichat.scrollHeight}
        function showType(){const d=document.createElement('div');d.className='aitype';d.id='aitype';d.innerHTML='<span></span><span></span><span></span>';aichat.appendChild(d);aichat.scrollTop=aichat.scrollHeight}
        function hideType(){const t=$('aitype');if(t)t.remove()}
        async function sendAI(){
            const t=aiinp.value.trim();if(!t)return;aiinp.value='';addMsg(t,'u');showType();aisend.disabled=true;
            setTimeout(()=>{hideType();const q=t.toLowerCase();let a='–Я–Њ–њ—А–Њ–±—Г–є—В–µ —Б–њ—А–Њ—Б–Є—В—М –Є–љ–∞—З–µ.';if(q.includes('–њ—А–Є–≤–µ—В'))a='–Я—А–Є–≤–µ—В! –ѓ Cool AI.';else if(q.includes('–Ј–Њ–≤—Г—В'))a='–ѓ Cool AI вАФ –њ–Њ–Љ–Њ—Й–љ–Є–Ї get-cool.ru.';else if(q.includes('—Г–Љ–µ–µ—И—М'))a='–Ю—В–≤–µ—З–∞—О –љ–∞ –≤–Њ–њ—А–Њ—Б—Л, –њ–Њ–Љ–Њ–≥–∞—О –Є—Б–Ї–∞—В—М.';else if(q.includes('–њ–Њ–≥–Њ–і–∞'))a='–Я—А–Њ–≤–µ—А—М—В–µ –љ–∞ Gismeteo.';addMsg(a,'b');aisend.disabled=false},800);
        }
        aisend.addEventListener('click',sendAI);aiinp.addEventListener('keydown',e=>{if(e.key==='Enter')sendAI()});

        $('siconMain').addEventListener('click',()=>{const q=siMain.value.trim();if(q)goToResults(q)});
        siMain.addEventListener('keydown',e=>{if(e.key==='Enter'){const q=siMain.value.trim();if(q)goToResults(q)}});
        $('searchBtn').addEventListener('click',()=>{const q=siMain.value.trim();if(q)goToResults(q)});
        $('siconSm').addEventListener('click',()=>{const q=siSm.value.trim();if(q)doSearch(q)});
        siSm.addEventListener('keydown',e=>{if(e.key==='Enter'){const q=siSm.value.trim();if(q)doSearch(q)}});
        document.querySelectorAll('.hint span').forEach(s=>s.addEventListener('click',()=>goToResults(s.dataset.q)));
        showAds.addEventListener('change',()=>{const q=siSm.value.trim();if(q)doSearch(q)});
        tgl(siMain,sclrMain);tgl(siSm,sclrSm);
    </script>
</body>
    </html>
