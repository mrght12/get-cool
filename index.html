<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>get-cool.ru — Чистый поиск без рекламы</title>
    <!-- Часть 2: CSS-стили (вставьте сюда) -->
</head>
<body>
    <!-- Фоновые эффекты -->
    <div class="bg-glow g1"></div>
    <div class="bg-glow g2"></div>
    <div class="particles" id="particles"></div>

    <!-- Основное приложение -->
    <div class="app">
        <!-- Поиск по центру -->
        <div class="search-center" id="searchCenter">
            <div class="logo-wrap">
                <h1 class="logo">get-cool</h1>
                <p class="logo-sub">Поиск без рекламы. Только суть.</p>
                <span class="domain-badge">get-cool.ru</span>
            </div>
            <div class="search-section">
                <div class="search-wrapper">
                    <input type="text" class="search-input" id="searchInput" placeholder="Введите запрос..." autocomplete="off">
                    <button class="search-btn" id="searchBtn" title="Искать">
                        <span class="icon">🔍</span>
                        <span class="spinner"></span>
                    </button>
                </div>
                <div class="search-hint">
                    Например:
                    <span data-query="кофе рецепт">кофе</span>
                    <span data-query="новости сегодня">новости</span>
                    <span data-query="погода Москва">погода</span>
                </div>
            </div>
        </div>

        <!-- Статус-бар -->
        <div class="status-bar" id="statusBar">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Готов к поиску</span>
        </div>

        <!-- Результаты поиска -->
        <div class="results-scroll" id="resultsScroll">
            <div class="results-container" id="resultsContainer"></div>
        </div>

        <!-- Футер -->
        <div class="footer" id="footer">
            get-cool.ru &nbsp;·&nbsp; Чистый интернет &nbsp;·&nbsp; 2026
        </div>
    </div>

    <!-- Ридер (очищенная страница) -->
    <div class="reader-overlay" id="readerOverlay">
        <div class="reader-window">
            <div class="reader-header">
                <div class="reader-header-left">
                    <span class="reader-logo">get-cool</span>
                    <span class="reader-badge">Без рекламы</span>
                </div>
                <button class="reader-close" id="readerClose">✕</button>
            </div>
            <div class="reader-content" id="readerContent">
                <div class="reader-loading">
                    <div class="reader-spinner"></div>
                    Загружаем чистую версию...
                </div>
            </div>
        </div>
    </div>

    <!-- Часть 3: JavaScript (вставьте сюда) -->
</body>
    </html>
