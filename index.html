<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>get-cool.ru — Чистый поиск</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:#0a0a10;color:#d4d4d8;font-family:system-ui,sans-serif}
        .app{height:100%;display:flex;flex-direction:column;align-items:center;overflow:hidden}
        .search-center{flex:1;width:100%;max-width:680px;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .4s}
        .search-center.top{flex:0 0 auto;padding-top:30px;padding-bottom:10px}
        .logo{font-size:52px;font-weight:900;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;transition:font-size .4s}
        .search-center.top .logo{font-size:30px}
        .logo-sub{font-size:14px;color:#888;margin-top:4px}
        .domain-badge{background:#13131d;border:1px solid #1e1e2e;border-radius:20px;padding:4px 14px;font-size:12px;color:#60a5fa;margin-top:6px}
        .search-box{display:flex;align-items:center;background:#13131d;border:2px solid #1e1e2e;border-radius:28px;padding:4px 8px;margin-top:16px;width:100%;transition:.25s}
        .search-box:focus-within{border-color:#60a5fa;box-shadow:0 0 30px rgba(96,165,250,.1)}
        .search-icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .search-icon svg{width:22px;height:22px;fill:#888}
        .search-box:focus-within .search-icon svg{fill:#60a5fa}
        .search-input{flex:1;padding:10px 4px;font-size:17px;background:transparent;border:none;color:#fff;outline:none;min-width:0}
        .search-input::placeholder{color:#555}
        .search-clear{width:32px;height:32px;border-radius:50%;border:none;background:transparent;color:#666;font-size:20px;cursor:pointer;display:none;align-items:center;justify-content:center}
        .search-clear.show{display:flex}
        .search-divider{width:1px;height:24px;background:#1e1e2e;margin:0 8px}
        .search-btn{width:40px;height:40px;border-radius:50%;border:none;background:linear-gradient(135deg,#60a5fa,#a78bfa);cursor:pointer;display:flex;align-items:center;justify-content:center}
        .search-btn svg{width:18px;height:18px;fill:#0a0a10}
        .search-btn:disabled{opacity:.5}
        .search-btn .spinner{display:none;width:18px;height:18px;border:2px solid #0a0a10;border-top-color:transparent;border-radius:50%;animation:s .7s linear infinite}
        .search-btn.loading .s-icon{display:none}
        .search-btn.loading .spinner{display:block}
        @keyframes s{to{transform:rotate(360deg)}}
        .hint{text-align:center;font-size:12px;color:#555;margin-top:8px}
        .hint span{color:#888;cursor:pointer;text-decoration:underline;margin:0 4px}
        .hint span:hover{color:#60a5fa}
        .status{display:flex;align-items:center;gap:8px;padding:6px 14px;background:#13131d;border:1px solid #1e1e2e;border-radius:20px;font-size:11px;color:#888;margin-top:6px;opacity:0;transition:.3s}
        .status.on{opacity:1}
        .status-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:b 1.5s infinite}
        .status-dot.searching{background:#fbbf24;animation:b .5s infinite}
        @keyframes b{0%,100%{opacity:1}50%{opacity:.3}}
        .results{display:none;flex:1;width:100%;max-width:780px;padding:0 20px;overflow-y:auto;min-height:0}
        .results.on{display:block}
        .list{display:flex;flex-direction:column;gap:8px;padding-bottom:20px}
        .card{background:#13131d;border:1px solid #1e1e2e;border-radius:14px;padding:14px 16px;cursor:pointer;transition:.25s;display:flex;gap:12px}
        .card:hover{transform:translateY(-2px);border-color:#fff2}
        .card.clean{border-left:3px solid #4ade80}
        .card.ads{border-left:3px solid #f59e0b44;opacity:.85}
        .cinfo{flex:1;min-width:0}
        .curl{font-size:10px;color:#60a5fa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
        .ctitle{font-size:16px;font-weight:700;color:#fff;margin-bottom:4px}
        .csnip{font-size:12px;color:#888;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
        .badge{font-size:9px;padding:3px 8px;border-radius:8px;font-weight:700;white-space:nowrap;height:fit-content}
        .badge.clean{background:#22c55e18;color:#4ade80}
        .badge.ads{background:#f59e0b18;color:#fbbf24}
        .empty{text-align:center;padding:40px;color:#888}
        .reader-overlay{position:fixed;inset:0;background:#000d;z-index:100;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
        .reader-overlay.open{display:flex}
        .reader-win{background:#f8f9fa;color:#1a1a2e;width:100%;max-width:720px;border-radius:14px;overflow:hidden}
        .reader-head{background:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0}
        .rlogo{font-weight:900;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .rbadge{font-size:9px;background:#22c55e18;color:#16a34a;padding:2px 7px;border-radius:7px;font-weight:700;margin-left:6px}
        .rclose{width:32px;height:32px;border-radius:50%;border:none;background:#f1f5f9;font-size:16px;cursor:pointer}
        .rcontent{padding:24px 20px;line-height:1.7;font-size:15px}
        .rcontent h1{font-size:22px;margin-bottom:14px;color:#0f172a}
        .rcontent p{margin-bottom:12px;color:#334155}
        .rload{text-align:center;padding:40px;color:#64748b}
        .rspin{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#60a5fa;border-radius:50%;animation:s .8s linear infinite;margin:0 auto 12px}
        .foot{text-align:center;font-size:10px;color:#333;padding:8px;display:none}
        .foot.on{display:block}
        @media(max-width:600px){.logo{font-size:38px}.search-center.top .logo{font-size:24px}.search-input{font-size:15px}.ctitle{font-size:14px}}
    </style>
</head>
<body>
    <div class="app">
        <div class="search-center" id="sc">
            <h1 class="logo">get-cool</h1>
            <p class="logo-sub">Поиск без рекламы. Только суть.</p>
            <span class="domain-badge">get-cool.ru</span>
            <div class="search-box" id="sb">
                <div class="search-icon"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></div>
                <input class="search-input" id="si" placeholder="Введите запрос..." autocomplete="off">
                <button class="search-clear" id="sclear">×</button>
                <div class="search-divider"></div>
                <button class="search-btn" id="sbtn">
                    <svg class="s-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <span class="spinner"></span>
                </button>
            </div>
            <div class="hint">Например: <span data-q="кофе">кофе</span> <span data-q="новости">новости</span> <span data-q="погода">погода</span></div>
        </div>
        <div class="status" id="st"><span class="status-dot" id="sd"></span><span id="stx">Готов к поиску</span></div>
        <div class="results" id="rs">
            <div class="list" id="rl"></div>
        </div>
        <div class="foot" id="ft">get-cool.ru · Чистый интернет · 2026</div>
    </div>
    <div class="reader-overlay" id="ro">
        <div class="reader-win">
            <div class="reader-head"><div><span class="rlogo">get-cool</span><span class="rbadge">Без рекламы</span></div><button class="rclose" id="rc">✕</button></div>
            <div class="rcontent" id="rct"><div class="rload"><div class="rspin"></div>Загружаем...</div></div>
        </div>
    </div>
    <script>
        const $ = id => document.getElementById(id);
        const sc = $('sc'),
            si = $('si'),
            scl = $('sclear'),
            sb = $('sbtn'),
            rl = $('rl'),
            rs = $('rs'),
            st = $('st'),
            sd = $('sd'),
            stx = $('stx'),
            ft = $('ft'),
            ro = $('ro'),
            rct = $('rct'),
            rc = $('rc');
        let searching = false,
            searched = false;
        const CLEAN = ['wikipedia.org', 'habr.com', 'github.com', 'stackoverflow.com', 'arxiv.org', 'gitlab.com',
        'developer.mozilla.org'];

        function isClean(url) { try { const h = new URL(url).hostname.replace('www.', ''); return CLEAN.some(c => h === c ||
                h.endsWith('.' + c)) } catch { return false } }

        function esc(s) { const d = document.createElement('div');
            d.textContent = s; return d.innerHTML }

        function toggleClear() { scl.classList.toggle('show', si.value.length > 0) }
        si.addEventListener('input', toggleClear);
        scl.addEventListener('click', () => { si.value = '';
            toggleClear();
            si.focus() });

        function setStatus(t, s = false) { stx.textContent = t;
            st.classList.add('on');
            sd.classList.toggle('searching', s) }

        function moveTop() { if (!searched) { searched = true;
                sc.classList.add('top');
                rs.classList.add('on');
                ft.classList.add('on') } }

        async function doSearch(q) {
            if (searching || !q || !q.trim()) return;
            q = q.trim();
            si.value = q;
            toggleClear();
            moveTop();
            searching = true;
            sb.classList.add('loading');
            sb.disabled = true;
            rl.innerHTML = '';
            setStatus(`Ищем: "${q}"`, true);
            let results = [];
            try {
                const r = await fetch(
                    `https://ru.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*&srlimit=10`
                    );
                const d = await r.json();
                if (d.query?.search) d.query.search.forEach(p => results.push({ url: `https://ru.wikipedia.org/wiki/${encodeURIComponent(p.title.replace(/ /g,'_'))}`,
                    title: p.title, snippet: (p.snippet || '').replace(/<\/?[^>]+(>|$)/g, ''), source: 'wiki' }))
            } catch (e) {}
            try {
                const r = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&no_html=1&t=gc`);
                const d = await r.json();
                if (d.AbstractURL && d.AbstractText) results.push({ url: d.AbstractURL, title: d.Heading || q,
                    snippet: d.AbstractText, source: 'ddg' });
                if (d.RelatedTopics) d.RelatedTopics.forEach(t => { if (t.FirstURL && t.Text) results.push({ url: t
                            .FirstURL, title: t.Text.split(' - ')[0], snippet: t.Text, source: 'ddg' }) });
                if (d.Results) d.Results.forEach(r => { if (r.FirstURL && r.Text) results.push({ url: r.FirstURL,
                        title: r.Text.split(' - ')[0], snippet: r.Text, source: 'ddg' }) })
            } catch (e) {}
            if (!results.length) results = [{ url: 'https://habr.com/ru/', title: 'Хабр', snippet: 'IT-сообщество',
                    source: 'test' }, { url: 'https://ru.wikipedia.org/', title: 'Википедия',
                    snippet: 'Свободная энциклопедия', source: 'test' }, { url: 'https://github.com', title: 'GitHub',
                    snippet: 'Платформа для разработки', source: 'test' }];
            const seen = new Set();
            const clean = [],
                ads = [];
            results.forEach(r => {
                if (!r.url?.startsWith('http') || seen.has(r.url)) return;
                seen.add(r.url);
                r.isClean = isClean(r.url);
                (r.isClean ? clean : ads).push(r)
            });
            const sorted = [...clean, ...ads].slice(0, 20);
            rl.innerHTML = '';
            sorted.forEach(r => {
                const c = document.createElement('div');
                c.className = 'card ' + (r.isClean ? 'clean' : 'ads');
                c.innerHTML =
                    `<div class="cinfo"><div class="curl">${esc(r.url)}</div><div class="ctitle">${esc(r.title)}</div><div class="csnip">${esc(r.snippet||'')}</div></div><span class="badge ${r.isClean?'clean':'ads'}">${r.isClean?'✓ Чисто':'⚠ Реклама'}</span>`;
                c.addEventListener('click', () => openReader(r.url, r.title));
                rl.appendChild(c)
            });
            setStatus(`Найдено: ${sorted.length} (Чистых: ${clean.length})`);
            rs.scrollTop = 0;
            searching = false;
            sb.classList.remove('loading');
            sb.disabled = false
        }

        async function openReader(url, title) {
            ro.classList.add('open');
            rct.innerHTML = '<div class="rload"><div class="rspin"></div>Загружаем...</div>';
            try {
                const r = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url));
                if (!r.ok) throw 0;
                const h = await r.text();
                const p = new DOMParser();
                const d = p.parseFromString(h, 'text/html');
                d.querySelectorAll('script,style,iframe,[class*="ad"],[id*="ad"],.popup,.modal').forEach(e => e.remove());
                const t = d.querySelector('h1')?.textContent || d.querySelector('title')?.textContent || title;
                const a = d.querySelector('article') || d.querySelector('main') || d.body;
                const ps = a.querySelectorAll('p,h2,h3,li');
                let o = `<h1>${esc(t.trim())}</h1>`;
                if (ps.length) ps.forEach(e => { const x = e.textContent.trim(); if (x.length > 15) { const tg = e.tagName
                            .toLowerCase(); if (tg === 'h2') o +=
                            `<h2 style="font-size:18px;margin-top:18px">${esc(x)}</h2>`; else if (tg === 'h3') o +=
                            `<h3 style="font-size:15px;margin-top:14px">${esc(x)}</h3>`; else o += `<p>${esc(x)}</p>` } })
                else o += `<p>${esc(a.textContent.replace(/\s+/g,' ').trim().substring(0,4000))}</p>`;
                o +=
                    `<p style="margin-top:20px;font-size:11px;color:#94a3b8">Источник: <a href="${esc(url)}" target="_blank" style="color:#60a5fa">${esc(url)}</a></p>`;
                rct.innerHTML = o
            } catch (e) { rct.innerHTML =
                    `<div class="rload"><div style="font-size:36px">⚠️</div><p>Не удалось очистить</p><a href="${esc(url)}" target="_blank" style="color:#60a5fa">Открыть оригинал →</a></div>` }
        }

        function closeReader() { ro.classList.remove('open');
            rct.innerHTML = '' }
        sb.addEventListener('click', () => doSearch(si.value));
        si.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(si.value) });
        document.querySelectorAll('.hint span').forEach(s => s.addEventListener('click', () => doSearch(s.dataset.q)));
        rc.addEventListener('click', closeReader);
        ro.addEventListener('click', e => { if (e.target === ro) closeReader() });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReader() });
        toggleClear();
        setStatus('Готов к поиску');
    </script>
</body>
        </html>
