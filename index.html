<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>get-cool.ru — Чистый поиск без рекламы</title>
    <style>
        :root {
            --bg: #0a0a10;
            --surface: #13131d;
            --border: #1e1e2e;
            --text: #d4d4d8;
            --text-secondary: #88889a;
            --accent: #60a5fa;
            --accent2: #a78bfa;
            --danger: #f87171;
            --success: #4ade80;
            --radius: 14px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* ========== ФОН ========== */
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(180px);
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
        }
        .bg-glow.g1 {
            top: -200px;
            left: -200px;
            background: #60a5fa;
            animation: drift1 20s ease-in-out infinite;
        }
        .bg-glow.g2 {
            bottom: -200px;
            right: -200px;
            background: #a78bfa;
            animation: drift2 25s ease-in-out infinite;
        }
        @keyframes drift1 {
            0%,
            100% {
                transform: translate(0, 0);
            }
            33% {
                transform: translate(80px, 40px);
            }
            66% {
                transform: translate(-40px, -30px);
            }
        }
        @keyframes drift2 {
            0%,
            100% {
                transform: translate(0, 0);
            }
            33% {
                transform: translate(-60px, -50px);
            }
            66% {
                transform: translate(50px, 30px);
            }
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent);
            border-radius: 50%;
            animation: rise linear infinite;
            opacity: 0;
        }
        @keyframes rise {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            15% {
                opacity: 0.7;
            }
            85% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }

        /* ========== КОНТЕЙНЕР ========== */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 780px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ========== ЛОГО ========== */
        .logo-wrap {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 10px;
        }
        .logo {
            font-size: 54px;
            font-weight: 900;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: logoPulse 4s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%,
            100% {
                filter: brightness(1);
            }
            50% {
                filter: brightness(1.25);
            }
        }
        .logo-sub {
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 1px;
            margin-top: 2px;
        }
        .domain-badge {
            display: inline-block;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 13px;
            color: var(--accent);
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        /* ========== ПОИСКОВАЯ СТРОКА ========== */
        .search-section {
            width: 100%;
            margin: 24px 0;
        }
        .search-wrapper {
            position: relative;
            width: 100%;
        }
        .search-input {
            width: 100%;
            padding: 16px 56px 16px 22px;
            font-size: 18px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            color: #fff;
            outline: none;
            transition: var(--transition);
            letter-spacing: 0.3px;
        }
        .search-input::placeholder {
            color: #555;
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(96, 165, 250, 0.12);
        }
        .search-clear {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: #666;
            font-size: 20px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .search-clear.visible {
            display: flex;
        }
        .search-clear:hover {
            color: #fff;
            background: #ffffff10;
        }
        .search-hint {
            text-align: center;
            font-size: 12px;
            color: #444;
            margin-top: 8px;
        }
        .search-hint span {
            color: var(--text-secondary);
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 3px;
            transition: var(--transition);
            margin: 0 4px;
        }
        .search-hint span:hover {
            color: var(--accent);
        }

        /* ========== СТАТУС-БАР ========== */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 30px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .status-bar.visible {
            opacity: 1;
        }
        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
            animation: statusBlink 1.5s ease-in-out infinite;
        }
        .status-dot.searching {
            background: #fbbf24;
            animation: statusBlink 0.5s ease-in-out infinite;
        }
        @keyframes statusBlink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        /* ========== РЕЗУЛЬТАТЫ ========== */
        .results-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }
        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .result-card:hover {
            border-color: #ffffff20;
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }
        .result-card:active {
            transform: scale(0.985);
        }
        .result-url {
            font-size: 11px;
            color: var(--accent);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .result-title {
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
            line-height: 1.3;
        }
        .result-snippet {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .result-badge {
            position: absolute;
            top: 14px;
            right: 16px;
            font-size: 10px;
            background: #22c55e18;
            color: var(--success);
            padding: 3px 9px;
            border-radius: 10px;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        .result-card.no-clean .result-badge {
            background: #f59e0b18;
            color: #fbbf24;
        }

        /* ========== ОЧИЩЕННАЯ СТРАНИЦА (READER) ========== */
        .reader-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            display: none;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }
        .reader-overlay.open {
            display: flex;
        }
        .reader-window {
            background: #f8f9fa;
            color: #1a1a2e;
            width: 100%;
            max-width: 720px;
            border-radius: var(--radius);
            margin: 30px 0;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
            animation: readerSlideIn 0.35s ease;
        }
        @keyframes readerSlideIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .reader-header {
            background: #fff;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .reader-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .reader-logo {
            font-weight: 900;
            font-size: 16px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .reader-badge {
            font-size: 10px;
            background: #22c55e18;
            color: #16a34a;
            padding: 3px 8px;
            border-radius: 8px;
            font-weight: 700;
        }
        .reader-close {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: none;
            background: #f1f5f9;
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
            color: #475569;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reader-close:hover {
            background: #e2e8f0;
            color: #0f172a;
        }
        .reader-content {
            padding: 28px 26px;
            line-height: 1.8;
            font-size: 16px;
        }
        .reader-content h1 {
            font-size: 26px;
            margin-bottom: 16px;
            line-height: 1.3;
            color: #0f172a;
        }
        .reader-content p {
            margin-bottom: 14px;
            color: #334155;
        }
        .reader-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 12px 0;
        }
        .reader-loading {
            text-align: center;
            padding: 50px;
            color: #64748b;
        }
        .reader-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #e2e8f0;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 14px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ========== ПУСТОЙ РЕЗУЛЬТАТ ========== */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-secondary);
        }
        .empty-icon {
            font-size: 56px;
            margin-bottom: 14px;
            opacity: 0.6;
        }
        .empty-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #ccc;
        }
        .empty-sub {
            font-size: 13px;
            color: #666;
        }

        /* ========== ФУТЕР ========== */
        .footer {
            text-align: center;
            font-size: 11px;
            color: #333;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* ========== АДАПТИВ ========== */
        @media (max-width: 600px) {
            .logo {
                font-size: 38px;
            }
            .search-input {
                font-size: 16px;
                padding: 14px 48px 14px 16px;
            }
            .result-title {
                font-size: 15px;
            }
            .reader-content {
                padding: 20px 16px;
                font-size: 15px;
            }
            .reader-content h1 {
                font-size: 21px;
            }
        }
    </style>
</head>
<body>

    <!-- Фоновые эффекты -->
    <div class="bg-glow g1"></div>
    <div class="bg-glow g2"></div>
    <div class="particles" id="particles"></div>

    <!-- Основной контейнер -->
    <div class="container">
        <!-- Логотип -->
        <div class="logo-wrap">
            <h1 class="logo">get-cool</h1>
            <p class="logo-sub">Поиск без рекламы. Только суть.</p>
            <span class="domain-badge">get-cool.ru</span>
        </div>

        <!-- Поиск -->
        <div class="search-section">
            <div class="search-wrapper">
                <input
                type="text"
                class="search-input"
                id="searchInput"
                placeholder="Введите поисковый запрос..."
                autocomplete="off"
                >
                <button class="search-clear" id="searchClear" title="Очистить">×</button>
            </div>
            <div class="search-hint">
                Например:
                <span data-query="как приготовить кофе">кофе</span>
                <span data-query="новости науки">наука</span>
                <span data-query="рецепт блинов">блины</span>
            </div>
        </div>

        <!-- Статус -->
        <div class="status-bar" id="statusBar">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Введите запрос</span>
        </div>

        <!-- Результаты -->
        <div class="results-container" id="resultsContainer"></div>
    </div>

    <!-- Очищенная страница (ридер) -->
    <div class="reader-overlay" id="readerOverlay">
        <div class="reader-window">
            <div class="reader-header">
                <div class="reader-header-left">
                    <span class="reader-logo">get-cool</span>
                    <span class="reader-badge">Без рекламы</span>
                </div>
                <button class="reader-close" id="readerClose">✕</button>
            </div>
            <div class="reader-content" id="readerContent">
                <div class="reader-loading">
                    <div class="reader-spinner"></div>
                    Загружаем чистую версию...
                </div>
            </div>
        </div>
    </div>

    <!-- Футер -->
    <div class="footer">
        get-cool.ru &nbsp;·&nbsp; Поиск без рекламы и трекеров &nbsp;·&nbsp; 2026
    </div>

    <script>
        (function() {
            // ========== DOM ==========
            const searchInput = document.getElementById('searchInput');
            const searchClear = document.getElementById('searchClear');
            const resultsContainer = document.getElementById('resultsContainer');
            const statusBar = document.getElementById('statusBar');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const readerOverlay = document.getElementById('readerOverlay');
            const readerContent = document.getElementById('readerContent');
            const readerClose = document.getElementById('readerClose');
            const hintSpans = document.querySelectorAll('.search-hint span[data-query]');

            let searchTimer = null;
            let currentResults = [];

            // ========== ФОН: ЧАСТИЦЫ ==========
            const particlesEl = document.getElementById('particles');
            for (let i = 0; i < 35; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 10 + 's';
                p.style.animationDuration = (7 + Math.random() * 10) + 's';
                particlesEl.appendChild(p);
            }

            // ========== СТАТУС-БАР ==========
            function setStatus(text, searching = false) {
                statusText.textContent = text;
                statusBar.classList.add('visible');
                statusDot.classList.toggle('searching', searching);
            }

            // ========== ОЧИСТКА ПОЛЯ ==========
            function toggleClear() {
                if (searchInput.value.length > 0) {
                    searchClear.classList.add('visible');
                } else {
                    searchClear.classList.remove('visible');
                }
            }
            searchInput.addEventListener('input', toggleClear);
            searchClear.addEventListener('click', () => {
                searchInput.value = '';
                toggleClear();
                searchInput.focus();
                resultsContainer.innerHTML = '';
                currentResults = [];
                setStatus('Введите запрос');
            });

            // ========== ПОДСКАЗКИ-КЛИК ==========
            hintSpans.forEach(span => {
                span.addEventListener('click', () => {
                    const q = span.getAttribute('data-query');
                    searchInput.value = q;
                    toggleClear();
                    doSearch(q);
                });
            });

            // ========== ПОИСК ==========
            searchInput.addEventListener('keydown', (e) => {
