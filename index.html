<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>get-cool.ru — Чистый поиск без рекламы</title>
    <style>
        :root {
            --bg: #0a0a10;
            --surface: #13131d;
            --border: #1e1e2e;
            --text: #d4d4d8;
            --text-secondary: #88889a;
            --accent: #60a5fa;
            --accent2: #a78bfa;
            --success: #4ade80;
            --radius: 14px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ========== ФОН ========== */
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(180px);
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
        }
        .bg-glow.g1 {
            top: -200px;
            left: -200px;
            background: #60a5fa;
            animation: drift1 20s ease-in-out infinite;
        }
        .bg-glow.g2 {
            bottom: -200px;
            right: -200px;
            background: #a78bfa;
            animation: drift2 25s ease-in-out infinite;
        }
        @keyframes drift1 {
            0%,
            100% {
                transform: translate(0, 0);
            }
            33% {
                transform: translate(80px, 40px);
            }
            66% {
                transform: translate(-40px, -30px);
            }
        }
        @keyframes drift2 {
            0%,
            100% {
                transform: translate(0, 0);
            }
            33% {
                transform: translate(-60px, -50px);
            }
            66% {
                transform: translate(50px, 30px);
            }
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent);
            border-radius: 50%;
            animation: rise linear infinite;
            opacity: 0;
        }
        @keyframes rise {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            15% {
                opacity: 0.7;
            }
            85% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }

        /* ========== ВСЯ СТРАНИЦА ========== */
        .app {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* ========== ВЕРХНЯЯ ЧАСТЬ (всегда видна) ========== */
        .top-section {
            flex-shrink: 0;
            width: 100%;
            max-width: 780px;
            padding: 25px 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-wrap {
            text-align: center;
            margin-bottom: 8px;
        }
        .logo {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: logoPulse 4s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%,
            100% {
                filter: brightness(1);
            }
            50% {
                filter: brightness(1.25);
            }
        }
        .logo-sub {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 1px;
            margin-top: 2px;
        }
        .domain-badge {
            display: inline-block;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 12px;
            color: var(--accent);
            margin-top: 4px;
        }

        /* ========== ПОИСК ========== */
        .search-section {
            width: 100%;
            margin: 14px 0 8px;
        }
        .search-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .search-input {
            flex: 1;
            padding: 14px 18px;
            font-size: 16px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            color: #fff;
            outline: none;
            transition: var(--transition);
            letter-spacing: 0.3px;
            height: 50px;
        }
        .search-input::placeholder {
            color: #555;
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(96, 165, 250, 0.12);
        }

        .search-btn {
            width: 50px;
            height: 50px;
            border-radius: var(--radius);
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #0a0a10;
            font-size: 22px;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .search-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 25px rgba(96, 165, 250, 0.35);
        }
        .search-btn:active {
            transform: scale(0.95);
        }
        .search-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .search-btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #0a0a10;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .search-btn.loading .icon {
            display: none;
        }
        .search-btn.loading .spinner {
            display: block;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .search-hint {
            text-align: center;
            font-size: 11px;
            color: #444;
            margin-top: 6px;
        }
        .search-hint span {
            color: var(--text-secondary);
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 3px;
            transition: var(--transition);
            margin: 0 3px;
        }
        .search-hint span:hover {
            color: var(--accent);
        }

        /* ========== СТАТУС ========== */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 11px;
            color: var(--text-secondary);
            opacity: 0;
            transition: opacity 0.3s;
            flex-shrink: 0;
            margin-bottom: 6px;
        }
        .status-bar.visible {
            opacity: 1;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            animation: statusBlink 1.5s ease-in-out infinite;
        }
        .status-dot.searching {
            background: #fbbf24;
            animation: statusBlink 0.5s ease-in-out infinite;
        }
        @keyframes statusBlink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        /* ========== РЕЗУЛЬТАТЫ (скроллятся внутри) ========== */
        .results-scroll {
            flex: 1;
            width: 100%;
            max-width: 780px;
            padding: 0 20px;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            min-height: 0;
        }
        .results-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .results-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .results-scroll::-webkit-scrollbar-thumb {
            background: #ffffff15;
            border-radius: 4px;
        }

        .results-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-bottom: 20px;
        }
        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }
        .result-card:hover {
            border-color: #ffffff20;
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        .result-card:active {
            transform: scale(0.985);
        }
        .result-url {
            font-size: 10px;
            color: var(--accent);
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 55px;
        }
        .result-title {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
            line-height: 1.3;
        }
        .result-snippet {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .result-badge {
            position: absolute;
            top: 12px;
            right: 14px;
            font-size: 9px;
            background: #22c55e18;
            color: var(--success);
            padding: 3px 8px;
            border-radius: 8px;
            letter-spacing: 0.5px;
            font-weight: 700;
        }

        /* ========== ПУСТО ========== */
        .empty-state {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
        }
        .empty-icon {
            font-size: 44px;
            margin-bottom: 8px;
            opacity: 0.6;
        }
        .empty-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 3px;
            color: #ccc;
        }
        .empty-sub {
            font-size: 11px;
            color: #666;
        }

        /* ========== РИДЕР ========== */
        .reader-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            display: none;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }
        .reader-overlay.open {
            display: flex;
        }
        .reader-window {
            background: #f8f9fa;
            color: #1a1a2e;
            width: 100%;
            max-width: 720px;
            border-radius: var(--radius);
            margin: 20px 0;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
            animation: readerSlideIn 0.35s ease;
        }
        @keyframes readerSlideIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .reader-header {
            background: #fff;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .reader-header-left {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .reader-logo {
            font-weight: 900;
            font-size: 15px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .reader-badge {
            font-size: 9px;
            background: #22c55e18;
            color: #16a34a;
            padding: 2px 7px;
            border-radius: 7px;
            font-weight: 700;
        }
        .reader-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: #f1f5f9;
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition);
            color: #475569;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reader-close:hover {
            background: #e2e8f0;
            color: #0f172a;
        }
        .reader-content {
            padding: 24px 20px;
            line-height: 1.7;
            font-size: 15px;
        }
        .reader-content h1 {
            font-size: 22px;
            margin-bottom: 14px;
            line-height: 1.3;
            color: #0f172a;
        }
        .reader-content p {
            margin-bottom: 12px;
            color: #334155;
        }
        .reader-loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        .reader-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e2e8f0;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        /* ========== ФУТЕР ========== */
        .footer {
            text-align: center;
            font-size: 10px;
            color: #333;
            padding: 8px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        /* ========== АДАПТИВ ========== */
        @media (max-width: 600px) {
            .logo {
                font-size: 34px;
            }
            .search-input {
                font-size: 14px;
                padding: 12px 14px;
                height: 44px;
            }
            .search-btn {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }
            .result-title {
                font-size: 14px;
            }
            .reader-content {
                padding: 16px 14px;
                font-size: 14px;
            }
            .reader-content h1 {
                font-size: 19px;
            }
        }
    </style>
</head>
<body>

    <!-- Фон -->
    <div class="bg-glow g1"></div>
    <div class="bg-glow g2"></div>
    <div class="particles" id="particles"></div>

    <!-- Приложение -->
    <div class="app">
        <!-- Верх -->
        <div class="top-section">
            <div class="logo-wrap">
                <h1 class="logo">get-cool</h1>
                <p class="logo-sub">Поиск без рекламы. Только суть.</p>
                <span class="domain-badge">get-cool.ru</span>
            </div>

            <div class="search-section">
                <div class="search-wrapper">
                    <input
                    type="text"
                    class="search-input"
                    id="searchInput"
                    placeholder="Введите запрос..."
                    autocomplete="off"
                    >
                    <button class="search-btn" id="searchBtn" title="Искать">
                        <span class="icon">🔍</span>
                        <span class="spinner"></span>
                    </button>
                </div>
                <div class="search-hint">
                    Например:
                    <span data-query="кофе рецепт">кофе</span>
                    <span data-query="новости">новости</span>
                    <span data-query="погода">погода</span>
                </div>
            </div>

            <div class="status-bar" id="statusBar">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Готов к поиску</span>
            </div>
        </div>

        <!-- Результаты (скроллятся) -->
        <div class="results-scroll" id="resultsScroll">
            <div class="results-container" id="resultsContainer"></div>
        </div>

        <!-- Футер -->
        <div class="footer">
            get-cool.ru &nbsp;·&nbsp; Чистый интернет &nbsp;·&nbsp; 2026
        </div>
    </div>

    <!-- Ридер -->
    <div class="reader-overlay" id="readerOverlay">
        <div class="reader-window">
            <div class="reader-header">
                <div class="reader-header-left">
                    <span class="reader-logo">get-cool</span>
                    <span class="reader-badge">Без рекламы</span>
                </div>
                <button class="reader-close" id="readerClose">✕</button>
            </div>
            <div class="reader-content" id="readerContent">
                <div class="reader-loading">
                    <div class="reader-spinner"></div>
                    Загружаем чистую версию...
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ========== DOM ==========
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const resultsContainer = document.getElementById('resultsContainer');
            const resultsScroll = document.getElementById('resultsScroll');
            const statusBar = document.getElementById('statusBar');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const readerOverlay = document.getElementById('readerOverlay');
            const readerContent = document.getElementById('readerContent');
            const readerClose = document.getElementById('readerClose');
            const hintSpans = document.querySelectorAll('.search-hint span[data-query]');

            let currentResults = [];
            let isSearching = false;

            // ========== ЧАСТИЦЫ ==========
            const particlesEl = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createEleme
