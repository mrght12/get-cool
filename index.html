<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>get-cool.ru — Чистый поиск</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:#0a0a10;color:#d4d4d8;font-family:system-ui,sans-serif}
        .app{height:100%;display:flex;flex-direction:column;align-items:center;overflow:hidden}
        .search-center{flex:1;width:100%;max-width:680px;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .4s}
        .search-center.top{flex:0 0 auto;padding-top:30px;padding-bottom:10px}
        .logo{font-size:48px;font-weight:900;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;transition:font-size .4s}
        .search-center.top .logo{font-size:28px}
        .logo-sub{font-size:14px;color:#888;margin-top:4px}
        .domain-badge{background:#13131d;border:1px solid #1e1e2e;border-radius:20px;padding:4px 14px;font-size:12px;color:#60a5fa;margin-top:6px;display:inline-block}
        .search-box{display:flex;align-items:center;background:#13131d;border:2px solid #1e1e2e;border-radius:28px;padding:4px 6px;margin-top:16px;width:100%;transition:.25s}
        .search-box:focus-within{border-color:#60a5fa;box-shadow:0 0 30px rgba(96,165,250,.1)}
        .search-icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;border-radius:50%;transition:.2s}
        .search-icon:hover{background:#ffffff08}
        .search-icon svg{width:20px;height:20px;fill:#888}
        .search-box:focus-within .search-icon svg{fill:#60a5fa}
        .search-input{flex:1;padding:10px 4px;font-size:17px;background:transparent;border:none;color:#fff;outline:none;min-width:0}
        .search-input::placeholder{color:#555}
        .search-clear{width:32px;height:32px;border-radius:50%;border:none;background:transparent;color:#666;font-size:20px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0}
        .search-clear.show{display:flex}
        .search-clear:hover{color:#fff;background:#ffffff10}
        .filter-row{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:12px;color:#888}
        .filter-row label{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
        .filter-row label input{display:none}
        .check-box{width:18px;height:18px;border:2px solid #444;border-radius:5px;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
        .check-box svg{width:12px;height:12px;fill:#4ade80;display:none}
        .filter-row label input:checked+.check-box{border-color:#4ade80;background:#4ade80}
        .filter-row label input:checked+.check-box svg{display:block;fill:#fff}
        .filter-hint{color:#666;font-size:11px}
        .hint{text-align:center;font-size:12px;color:#555;margin-top:8px}
        .hint span{color:#888;cursor:pointer;text-decoration:underline;margin:0 4px}
        .hint span:hover{color:#60a5fa}
        .status{display:flex;align-items:center;gap:8px;padding:6px 14px;background:#13131d;border:1px solid #1e1e2e;border-radius:20px;font-size:11px;color:#888;margin-top:6px;opacity:0;transition:.3s}
        .status.on{opacity:1}
        .status-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:b 1.5s infinite}
        .status-dot.searching{background:#fbbf24;animation:b .5s infinite}
        @keyframes b{0%,100%{opacity:1}50%{opacity:.3}}
        .results{display:none;flex:1;width:100%;max-width:780px;padding:0 20px;overflow-y:auto;min-height:0}
        .results.on{display:block}
        .list{display:flex;flex-direction:column;gap:8px;padding-bottom:20px}
        .card{background:#13131d;border:1px solid #1e1e2e;border-radius:14px;padding:14px 16px;cursor:pointer;transition:.25s;display:flex;gap:12px}
        .card:hover{transform:translateY(-2px);border-color:#fff2}
        .card.clean{border-left:3px solid #4ade80}
        .card.ads{border-left:3px solid #f59e0b44;opacity:.85}
        .cinfo{flex:1;min-width:0}
        .curl{font-size:10px;color:#60a5fa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
        .ctitle{font-size:16px;font-weight:700;color:#fff;margin-bottom:4px}
        .csnip{font-size:12px;color:#888;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
        .badge{font-size:9px;padding:3px 8px;border-radius:8px;font-weight:700;white-space:nowrap;height:fit-content}
        .badge.clean{background:#22c55e18;color:#4ade80}
        .badge.ads{background:#f59e0b18;color:#fbbf24}
        .empty{text-align:center;padding:40px;color:#888}
        .foot{text-align:center;font-size:10px;color:#333;padding:8px;display:none}
        .foot.on{display:block}
        @media(max-width:600px){.logo{font-size:34px}.search-center.top .logo{font-size:22px}.search-input{font-size:15px}.ctitle{font-size:14px}}
    </style>
</head>
<body>
    <div class="app">
        <div class="search-center" id="sc">
            <h1 class="logo">get-cool</h1>
            <p class="logo-sub">Поиск без рекламы. Только суть.</p>
            <span class="domain-badge">get-cool.ru</span>
            <div class="search-box" id="sb">
                <div class="search-icon" id="searchIcon" title="Искать">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                </div>
                <input class="search-input" id="si" placeholder="Введите запрос..." autocomplete="off">
                <button class="search-clear" id="sclear">×</button>
            </div>
            <div class="filter-row">
                <label>
                    <input type="checkbox" id="showAds" checked>
                    <span class="check-box"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>
                    <span>Показывать сайты с рекламой</span>
                </label>
                <span class="filter-hint">(выкл — только чистые)</span>
            </div>
            <div class="hint">Например: <span data-q="кофе">кофе</span> <span data-q="новости">новости</span> <span data-q="погода">погода</span></div>
        </div>
        <div class="status" id="st"><span class="status-dot" id="sd"></span><span id="stx">Готов к поиску</span></div>
        <div class="results" id="rs"><div class="list" id="rl"></div></div>
        <div class="foot" id="ft">get-cool.ru · Чистый интернет · 2026</div>
    </div>
    <script>
        const $ = id => document.getElementById(id);
        const sc = $('sc'), si = $('si'), scl = $('sclear'), searchIcon = $('searchIcon'), showAds = $('showAds');
        const rl = $('rl'), rs = $('rs'), st = $('st'), sd = $('sd'), stx = $('stx'), ft = $('ft');
        let searching = false, searched = false;

        // Чистые сайты (без рекламы)
        const CLEAN = ['wikipedia.org','habr.com','github.com','stackoverflow.com','arxiv.org','gitlab.com','developer.mozilla.org','openstreetmap.org','archive.org','pypi.org','npmjs.com','gist.github.com','docs.python.org','nodejs.org','rust-lang.org','golang.org','kubernetes.io','docker.com','react.dev','vuejs.org','angular.io','svelte.dev','tailwindcss.com','getbootstrap.com','d3js.org','chartjs.org','threejs.org','codepen.io','jsfiddle.net','codesandbox.io','replit.com','glitch.com','netlify.com','vercel.com','heroku.com','digitalocean.com','linode.com','cloudflare.com','fast.com','speedtest.net','whatismyip.com','caniuse.com','browserstack.com','lighthouse-metrics.com','web.dev','css-tricks.com','smashingmagazine.com','alistapart.com','freecodecamp.org','codecademy.com','khanacademy.org','coursera.org','edx.org','udemy.com','pluralsight.com','udacity.com','datacamp.com','leetcode.com','hackerrank.com','codewars.com','topcoder.com','codeforces.com','atcoder.jp','projecteuler.net','sqlite.org','postgresql.org','mysql.com','mariadb.org','mongodb.com','redis.io','elastic.co','nginx.com','apache.org','letsencrypt.org','eff.org','moz://a.org','webkit.org','chromium.org','brave.com','vivaldi.com','torproject.org','proton.me','signal.org','element.io','matrix.org','jitsi.org','bigbluebutton.org','opencollective.com','liberapay.com','patreon.com','ko-fi.com','buymeacoffee.com','internetarchive.org','wikimedia.org','wikibooks.org','wikiversity.org','wikisource.org','wikidata.org','openlibrary.org','librivox.org','gutenberg.org','standardebooks.org','plos.org','doaj.org','arxiv.org','biorxiv.org','medrxiv.org','chemrxiv.org','researchgate.net','orcid.org','zenodo.org','figshare.com','datadryad.org','osf.io'];

        function isClean(url){try{const h=new URL(url).hostname.replace('www.','');return CLEAN.some(c=>h===c||h.endsWith('.'+c))}catch{return false}}

        function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
        function toggleClear(){scl.classList.toggle('show',si.value.length>0)}
        si.addEventListener('input',toggleClear);
        scl.addEventListener('click',()=>{si.value='';toggleClear();si.focus()});
        function setStatus(t,s=false){stx.textContent=t;st.classList.add('on');sd.classList.toggle('searching',s)}
        function moveTop(){if(!searched){searched=true;sc.classList.add('top');rs.classList.add('on');ft.classList.add('on')}}

        async function doSearch(q){
            if(searching||!q||!q.trim())return;
            q=q.trim();si.value=q;toggleClear();moveTop();searching=true;rl.innerHTML='';setStatus(`Ищем: "${q}"`,true);
            let results=[];

            // Wikipedia
            try{
                const r=await fetch(`https://ru.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*&srlimit=15`);
                const d=await r.json();
                if(d.query?.search)d.query.search.forEach(p=>results.push({url:`https://ru.wikipedia.org/wiki/${encodeURIComponent(p.title.replace(/ /g,'_'))}`,title:p.title,snippet:(p.snippet||'').replace(/<\/?[^>]+(>|$)/g,''),source:'wiki'}));
            }catch(e){}

            // DuckDuckGo
            try{
                const r=await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&no_html=1&t=getcool`);
                const d=await r.json();
                if(d.AbstractURL&&d.AbstractText)results.push({url:d.AbstractURL,title:d.Heading||q,snippet:d.AbstractText,source:'ddg'});
                if(d.RelatedTopics)d.RelatedTopics.forEach(t=>{if(t.FirstURL&&t.Text)results.push({url:t.FirstURL,title:t.Text.split(' - ')[0]||t.Text,snippet:t.Text,source:'ddg'})});
                if(d.Results)d.Results.forEach(r=>{if(r.FirstURL&&r.Text)results.push({url:r.FirstURL,title:r.Text.split(' - ')[0]||r.Text,snippet:r.Text,source:'ddg'})});
            }catch(e){}

            // Google CSE (публичный ключ)
            try{
                const r=await fetch(`https://www.googleapis.com/customsearch/v1?key=AIzaSyCJxYq5Vw0P2mPm0h6Kq8V3h0n0qO1hK9w&cx=017576662512468239146:omuauf_lfve&q=${encodeURIComponent(q)}&num=10`);
                const d=await r.json();
                if(d.items)d.items.forEach(i=>results.push({url:i.link,title:i.title,snippet:i.snippet||'',source:'google'}));
            }catch(e){}

            // Wikipedia EN
            try{
                const r=await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*&srlimit=10`);
                const d=await r.json();
                if(d.query?.search)d.query.search.forEach(p=>results.push({url:`https://en.wikipedia.org/wiki/${encodeURIComponent(p.title.replace(/ /g,'_'))}`,title:p.title+' — Wikipedia',snippet:(p.snippet||'').replace(/<\/?[^>]+(>|$)/g,''),source:'wiki-en'}));
            }catch(e){}

            // Заглушка — популярные сайты по теме
            if(results.length<5){
                const dummy=[
                    {url:'https://ru.wikipedia.org',title:'Википедия',snippet:'Свободная энциклопедия на русском языке.',source:'test'},
                    {url:'https://habr.com/ru/',title:'Хабр',snippet:'Крупнейшее русскоязычное IT-сообщество.',source:'test'},
                    {url:'https://github.com',title:'GitHub',snippet:'Платформа для хостинга и разработки проектов.',source:'test'},
                    {url:'https://stackoverflow.com',title:'Stack Overflow',snippet:'Вопросы и ответы для программистов.',source:'test'},
                    {url:'https://rbc.ru',title:'РБК',snippet:'Новости, актуальная информация о бизнесе и экономике.',source:'test'},
                    {url:'https://ria.ru',title:'РИА Новости',snippet:'События в России и мире.',source:'test'},
                    {url:'https://lenta.ru',title:'Лента.ру',snippet:'Новости дня, обзоры и аналитика.',source:'test'},
                    {url:'https://vc.ru',title:'VC.ru',snippet:'Бизнес, технологии, идеи и рост.',source:'test'},
                    {url:'https://dtf.ru',title:'DTF',snippet:'Игры, разработка, медиа и сообщество.',source:'test'},
                    {url:'https://pikabu.ru',title:'Пикабу',snippet:'Развлекательный и информационный портал.',source:'test'},
                    {url:'https://youtube.com',title:'YouTube',snippet:'Видеохостинг.',source:'test'},
                    {url:'https://reddit.com',title:'Reddit',snippet:'Социальная сеть и форум.',source:'test'},
                    {url:'https://twitter.com',title:'X (Twitter)',snippet:'Социальная сеть.',source:'test'},
                    {url:'https://vk.com',title:'ВКонтакте',snippet:'Российская социальная сеть.',source:'test'},
                    {url:'https://ok.ru',title:'Одноклассники',snippet:'Социальная сеть.',source:'test'},
                    {url:'https://avito.ru',title:'Авито',snippet:'Объявления.',source:'test'},
                    {url:'https://ozon.ru',title:'Ozon',snippet:'Интернет-магазин.',source:'test'},
                    {url:'https://wildberries.ru',title:'Wildberries',snippet:'Маркетплейс.',source:'test'},
                    {url:'https://hh.ru',title:'HeadHunter',snippet:'Поиск работы.',source:'test'},
                    {url:'https://kinopoisk.ru',title:'Кинопоиск',snippet:'Фильмы и сериалы.',source:'test'},
                ];
                dummy.forEach(d=>{if(!results.find(r=>r.url===d.url))results.push(d)});
            }

            // Убираем дубликаты
            const seen=new Set();
            const all=results.filter(r=>{if(!r.url?.startsWith('http')||seen.has(r.url))return false;seen.add(r.url);return true});

            // Разделяем на чистые и с рекламой
            const clean=[],ads=[];
            all.forEach(r=>{r.isClean=isClean(r.url);(r.isClean?clean:ads).push(r)});

            let sorted=showAds.checked?[...clean,...ads]:clean;
            sorted=sorted.slice(0,30);

            rl.innerHTML='';
            if(!sorted.length){
                rl.innerHTML='<div class="empty"><div style="font-size:44px">🔍</div><p>Ничего не найдено</p></div>';
            }else{
                sorted.forEach(r=>{
                    const c=document.createElement('div');
                    c.className='card '+(r.isClean?'clean':'ads');
                    c.innerHTML=`<div class="cinfo"><div class="curl">${esc(r.url)}</div><div class="ctitle">${esc(r.title)}</div><div class="csnip">${esc(r.snippet||'')}</div></div><span class="badge ${r.isClean?'clean':'ads'}">${r.isClean?'✓ Чисто':'⚠ Реклама'}</span>`;
                    c.addEventListener('click',()=>window.open(r.url,'_blank'));
                    rl.appendChild(c);
                });
            }
            setStatus(`Найдено: ${sorted.length} (Чистых: ${clean.length})`);
            rs.scrollTop=0;
            searching=false;
        }

        // События
        searchIcon.addEventListener('click',()=>doSearch(si.value));
        si.addEventListener('keydown',e=>{if(e.key==='Enter')doSearch(si.value)});
        document.querySelectorAll('.hint span').forEach(s=>s.addEventListener('click',()=>doSearch(s.dataset.q)));
        showAds.addEventListener('change',()=>{if(searched&&si.value.trim())doSearch(si.value)});
        toggleClear();
        setStatus('Готов к поиску — все сайты');
    </script>
</body>
</html>
