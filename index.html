<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>get-cool.ru</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,sans-serif;background:#0a0a10;color:#d4d4d8;min-height:100vh}
        .app{max-width:900px;margin:0 auto;padding:0 20px;display:flex;flex-direction:column;min-height:100vh}

        /* Главная */
        .home{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-bottom:15vh}
        .logo{font-size:52px;font-weight:900;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
        .logo-sub{color:#888;margin-bottom:22px;font-size:14px}
        .sbox{display:flex;align-items:center;background:#13131d;border:2px solid #1e1e2e;border-radius:28px;padding:6px 8px;width:100%;max-width:600px;transition:.3s}
        .sbox:focus-within{border-color:#60a5fa;box-shadow:0 0 30px rgba(96,165,250,.12)}
        .sicon{width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%}
        .sicon svg{width:22px;height:22px;fill:#888}.sbox:focus-within .sicon svg{fill:#60a5fa}
        .sinp{flex:1;padding:10px 4px;font-size:16px;background:transparent;border:none;color:#fff;outline:none;min-width:0}
        .sinp::placeholder{color:#555}
        .sclr{width:32px;height:32px;border-radius:50%;border:none;background:transparent;color:#666;font-size:20px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0}
        .sclr.on{display:flex}
        .btns{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;justify-content:center}
        .btn{padding:10px 20px;border-radius:22px;font-size:13px;cursor:pointer;transition:.2s;border:none;font-weight:600}
        .btn-search{background:#1e1e2e;color:#ccc}.btn-search:hover{background:#2a2a3a}
        .btn-ai{background:linear-gradient(135deg,#a78bfa,#60a5fa);color:#fff}.btn-ai:hover{opacity:.9}
        .btn-acc{background:#13131d;border:1px solid #333;color:#aaa}.btn-acc:hover{background:#1e1e2e}
        .hint{font-size:11px;color:#555;margin-top:14px}.hint span{color:#888;cursor:pointer;margin:0 3px;text-decoration:underline}.hint span:hover{color:#60a5fa}

        /* Результаты */
        .res-page{display:none;flex:1;flex-direction:column;padding-top:16px}.res-page.on{display:flex}
        .top-bar{display:flex;align-items:center;gap:8px;padding-bottom:10px;border-bottom:1px solid #1e1e2e;margin-bottom:12px;flex-wrap:wrap}
        .logo-sm{font-size:22px;font-weight:900;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;flex-shrink:0}
        .sbox-sm{display:flex;align-items:center;background:#13131d;border:1px solid #1e1e2e;border-radius:22px;padding:2px 6px;flex:1;min-width:160px}
        .sicon-sm{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer}
        .sicon-sm svg{width:16px;height:16px;fill:#888}
        .sinp-sm{flex:1;padding:6px 4px;font-size:13px;background:transparent;border:none;color:#fff;outline:none;min-width:0}
        .sclr-sm{width:26px;height:26px;border-radius:50%;border:none;background:transparent;color:#666;font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0}
        .sclr-sm.on{display:flex}
        .top-btn{padding:6px 12px;border-radius:16px;font-size:11px;cursor:pointer;border:none;font-weight:600;white-space:nowrap}
        .top-btn.ai{background:linear-gradient(135deg,#a78bfa,#60a5fa);color:#fff}
        .top-btn.acc{background:#1e1e2e;color:#aaa}
        .filters{display:flex;gap:6px;margin-bottom:8px;align-items:center;font-size:10px;color:#888}
        .filters label{display:flex;align-items:center;gap:4px;cursor:pointer}.filters input{display:none}
        .cb{width:14px;height:14px;border:2px solid #444;border-radius:3px;display:flex;align-items:center;justify-content:center}
        .cb svg{width:8px;height:8px;fill:#4ade80;display:none}
        .filters input:checked+.cb{border-color:#4ade80;background:#4ade80}
        .filters input:checked+.cb svg{display:block;fill:#fff}
        .stats{font-size:10px;color:#666;margin-bottom:8px}
        .list{display:flex;flex-direction:column;padding-bottom:20px}
        .card{cursor:pointer;padding:10px 0;border-bottom:1px solid #1e1e2e;transition:.2s}
        .card:hover .ct{text-decoration:underline}
        .cu{font-size:10px;color:#888;margin-bottom:3px;display:flex;align-items:center;gap:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .bd{font-size:7px;padding:1px 5px;border-radius:5px;font-weight:700;flex-shrink:0}
        .bd.g{background:#22c55e18;color:#4ade80}.bd.y{background:#f59e0b18;color:#fbbf24}
        .ct{font-size:16px;color:#60a5fa;margin-bottom:3px;line-height:1.3}
        .cs{font-size:12px;color:#888;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

        /* Браузер */
        .bover{position:fixed;inset:0;background:#000e;z-index:100;display:none;flex-direction:column}
        .bover.on{display:flex}
        .btop{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#13131d;border-bottom:1px solid #1e1e2e}
        .burl{flex:1;padding:7px 12px;background:#0a0a10;border:1px solid #1e1e2e;border-radius:18px;font-size:11px;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .bbtn{width:30px;height:30px;border-radius:50%;border:none;background:#1e1e2e;color:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
        .bbtn.x{background:#f8717120;color:#f87171}
        .bframe{flex:1;width:100%;border:none;background:#fff}

        /* AI */
        .aiover,.accover{position:fixed;inset:0;background:#000e;z-index:200;display:none;align-items:center;justify-content:center}
        .aiover.on,.accover.on{display:flex}
        .aiwin,.accwin{width:100%;max-width:550px;height:75vh;background:#13131d;border:1px solid #1e1e2e;border-radius:14px;display:flex;flex-direction:column;overflow:hidden}
        .aihead,.acchead{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #1e1e2e}
        .aititle,.acctitle{font-weight:800;font-size:17px;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .aiclose,.accclose{width:30px;height:30px;border-radius:50%;border:none;background:#f8717120;color:#f87171;cursor:pointer;font-size:15px}
        .aichat{flex:1;padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
        .aimsg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:12px;line-height:1.4;animation:fi .3s;white-space:pre-line}
        .aimsg.u{align-self:flex-end;background:linear-gradient(135deg,#60a5fa,#a78bfa);color:#fff}
        .aimsg.b{align-self:flex-start;background:#1e1e2e}
        .aitype{align-self:flex-start;padding:8px 12px;background:#1e1e2e;border-radius:12px;display:flex;gap:3px}
        .aitype span{width:5px;height:5px;background:#888;border-radius:50%;animation:tb 1.4s infinite}
        .aitype span:nth-child(2){animation-delay:.2s}.aitype span:nth-child(3){animation-delay:.4s}
        @keyframes tb{0%,80%,100%{transform:scale(1);opacity:.4}40%{transform:scale(1.3);opacity:1}}
        @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .airow{display:flex;gap:6px;padding:10px 14px;border-top:1px solid #1e1e2e}
        .aiinp{flex:1;padding:10px 12px;background:#0a0a10;border:1px solid #1e1e2e;border-radius:18px;color:#fff;font-size:12px;outline:none}
        .aisend{width:34px;height:34px;border-radius:50%;border:none;background:linear-gradient(135deg,#a78bfa,#60a5fa);color:#fff;cursor:pointer;font-size:15px}
        .aisend:disabled{opacity:.4}

        /* Аккаунт */
        .accform{display:flex;flex-direction:column;gap:8px;padding:14px}
        .accinp{padding:10px 12px;background:#0a0a10;border:1px solid #1e1e2e;border-radius:10px;color:#fff;font-size:12px;outline:none}
        .accinp:focus{border-color:#60a5fa}
        .accbtn{padding:10px;background:linear-gradient(135deg,#60a5fa,#a78bfa);border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer;font-size:12px}
        .hist-list{flex:1;overflow-y:auto;padding:10px}
        .hist-item{padding:8px 10px;border-bottom:1px solid #1e1e2e;cursor:pointer;font-size:11px;transition:.2s}
        .hist-item:hover{background:#ffffff05;color:#60a5fa}
        .foot{text-align:center;font-size:9px;color:#333;padding:8px;margin-top:auto}

        @media(max-width:600px){.logo{font-size:38px}.aiwin,.accwin{height:88vh;border-radius:10px}}
    </style>
</head>
<body>
    <div class="app">
        <!-- ГЛАВНАЯ -->
        <div class="home" id="home">
            <h1 class="logo">get-cool</h1>
            <p class="logo-sub">Поиск без рекламы. Только суть.</p>
            <div class="sbox" id="sboxMain">
                <div class="sicon" id="siconMain"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></div>
                <input class="sinp" id="siMain" placeholder="Введите запрос..." autocomplete="off">
                <button class="sclr" id="sclrMain">×</button>
            </div>
            <div class="btns">
                <button class="btn btn-search" id="searchBtn">🔍 Поиск</button>
                <button class="btn btn-ai" id="aiBtnHome">🧠 Cool AI</button>
                <button class="btn btn-acc" id="accBtnHome">👤 Аккаунт</button>
            </div>
            <div class="hint"><span data-q="кофе">кофе</span> · <span data-q="новости">новости</span> · <span data-q="погода">погода</span></div>
        </div>

        <!-- РЕЗУЛЬТАТЫ -->
        <div class="res-page" id="resPage">
            <div class="top-bar">
                <span class="logo-sm" id="logoSm">get-cool</span>
                <div class="sbox-sm" id="sboxSm">
                    <div class="sicon-sm" id="siconSm"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></div>
                    <input class="sinp-sm" id="siSm" placeholder="Поиск..." autocomplete="off">
                    <button class="sclr-sm" id="sclrSm">×</button>
                </div>
                <button class="top-btn ai" id="aiBtnRes">🧠 AI</button>
                <button class="top-btn acc" id="accBtnRes">👤</button>
            </div>
            <div class="filters"><label><input type="checkbox" id="showAds" checked><span class="cb"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>Сайты с рекламой</label></div>
            <div class="stats" id="stats"></div>
            <div class="list" id="list"></div>
        </div>
        <div class="foot">get-cool.ru · 2026</div>
    </div>

    <!-- БРАУЗЕР -->
    <div class="bover" id="bover">
        <div class="btop"><div class="burl" id="burl"></div><button class="bbtn" id="brel">↻</button><button class="bbtn x" id="bclose">✕</button></div>
        <iframe class="bframe" id="bframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    </div>

    <!-- AI -->
    <div class="aiover" id="aiover">
        <div class="aiwin">
            <div class="aihead"><span class="aititle">🧠 Cool AI</span><button class="aiclose" id="aiclose">✕</button></div>
            <div class="aichat" id="aichat"><div class="aimsg b">Привет! Я Cool AI. Спроси о погоде, новостях — найду ответ в интернете.</div></div>
            <div class="airow"><input class="aiinp" id="aiinp" placeholder="Спросите..." autocomplete="off"><button class="aisend" id="aisend">➤</button></div>
        </div>
    </div>

    <!-- АККАУНТ -->
    <div class="accover" id="accover">
        <div class="accwin">
            <div class="acchead"><span class="acctitle">👤 Аккаунт</span><button class="accclose" id="accclose">✕</button></div>
            <div class="accform" id="accForm">
                <input class="accinp" id="accName" placeholder="Имя" autocomplete="off">
                <input class="accinp" id="accPass" placeholder="Пароль" type="password" autocomplete="off">
                <button class="accbtn" id="accLogin">Войти / Создать</button>
            </div>
            <div class="hist-list" id="histList"><div style="color:#666;font-size:11px;text-align:center;padding:20px">Войдите для истории</div></div>
        </div>
    </div>

    <script>
        // ====== DOM ======
        const $=id=>document.getElementById(id);
        const home=$('home'),resPage=$('resPage'),siMain=$('siMain'),siSm=$('siSm'),showAds=$('showAds'),list=$('list'),stats=$('stats');
        const bover=$('bover'),bframe=$('bframe'),burl=$('burl'),aiover=$('aiover'),aichat=$('aichat'),aiinp=$('aiinp'),aisend=$('aisend');
        const accover=$('accover'),accName=$('accName'),accPass=$('accPass'),histList=$('histList'),accForm=$('accForm');
        let searching=false,currentUser=null;

        // ====== УТИЛИТЫ ======
        function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
        function tgl(inp,clr){clr.classList.toggle('on',inp.value.length>0)}

        // ====== ПОИСК ======
        async function doSearch(q){
            if(searching||!q||!q.trim())return;
            q=q.trim();searching=true;list.innerHTML='';stats.textContent='Ищем...';
            let results=[];

            // Wikipedia RU
            try{
                const r=await fetch(`https://ru.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*&srlimit=15`);
                const d=await r.json();
                if(d.query?.search)d.query.search.forEach(p=>results.push({url:`https://ru.wikipedia.org/wiki/${encodeURIComponent(p.title.replace(/ /g,'_'))}`,title:p.title,snippet:(p.snippet||'').replace(/<\/?[^>]+(>|$)/g,''),clean:true}));
            }catch(e){}

            // DuckDuckGo
            try{
                const r=await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&no_html=1&t=gc`);
                const d=await r.json();
                if(d.AbstractURL&&d.AbstractText)results.push({url:d.AbstractURL,title:d.Heading||q,snippet:d.AbstractText,clean:true});
                if(d.RelatedTopics)d.RelatedTopics.forEach(t=>{if(t.FirstURL&&t.Text)results.push({url:t.FirstURL,title:t.Text.split(' - ')[0],snippet:t.Text,clean:false})});
                if(d.Results)d.Results.forEach(r=>{if(r.FirstURL&&r.Text)results.push({url:r.FirstURL,title:r.Text.split(' - ')[0],snippet:r.Text,clean:false})});
            }catch(e){}

            // Wikipedia EN
            try{
                const r=await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*&srlimit=10`);
                const d=await r.json();
                if(d.query?.search)d.query.search.forEach(p=>results.push({url:`https://en.wikipedia.org/wiki/${encodeURIComponent(p.title.replace(/ /g,'_'))}`,title:p.title+' (EN)',snippet:(p.snippet||'').replace(/<\/?[^>]+(>|$)/g,''),clean:true}));
            }catch(e){}

            // Заглушка
            if(results.length<8){
                [{url:'https://ru.wikipedia.org',title:'Википедия',snippet:'Свободная энциклопедия.',clean:true},{url:'https://habr.com',title:'Хабр',snippet:'IT-сообщество.',clean:true},{url:'https://github.com',title:'GitHub',snippet:'Платформа для разработки.',clean:true},{url:'https://rbc.ru',title:'РБК',snippet:'Новости России и мира.',clean:false},{url:'https://ria.ru',title:'РИА Новости',snippet:'События дня.',clean:false},{url:'https://lenta.ru',title:'Лента.ру',snippet:'Новости.',clean:false},{url:'https://vc.ru',title:'VC.ru',snippet:'Бизнес и технологии.',clean:false},{url:'https://dtf.ru',title:'DTF',snippet:'Игры, медиа.',clean:false},{url:'https://pikabu.ru',title:'Пикабу',snippet:'Развлечения.',clean:false},{url:'https://youtube.com',title:'YouTube',snippet:'Видеохостинг.',clean:false}].forEach(d=>{if(!results.find(r=>r.url===d.url))results.push(d)});
            }

            // Убираем дубликаты
            const seen=new Set();
            const all=results.filter(r=>{if(!r.url?.startsWith('http')||seen.has(r.url))return false;seen.add(r.url);return true});
            const sorted=showAds.checked?all:all.filter(r=>r.clean);
            const final=sorted.slice(0,25);

            stats.textContent=`Найдено: ${final.length}`;
            list.innerHTML='';
            if(!final.length)list.innerHTML='<div style="text-align:center;padding:40px;color:#888">Ничего не найдено</div>';
            final.forEach(r=>{
                const c=document.createElement('div');c.className='card';
                const domain=r.url.replace(/^https?:\/\//,'').split('/')[0];
                c.innerHTML=`<div class="cu">${esc(domain)}<span class="bd ${r.clean?'g':'y'}">${r.clean?'✓':'⚠'}</span></div><div class="ct">${esc(r.title)}</div><div class="cs">${esc(r.snippet||'')}</div>`;
                c.addEventListener('click',()=>{openBrowser(r.url);addToHistory(r.url,r.title)});
                list.appendChild(c);
            });
            searching=false;
        }

        function openBrowser(u){bover.classList.add('on');burl.textContent=u;bframe.src=u}
        function closeBrowser(){bover.classList.remove('on');bframe.src=''}
        $('bclose').addEventListener('click',closeBrowser);
        $('brel').addEventListener('click',()=>{bframe.src=bframe.src});

        // ====== AI ======
        function openAI(){aiover.classList.add('on');aiinp.focus()}
        function closeAI(){aiover.classList.remove('on')}
        function addMsg(t,p){const m=document.createElement('div');m.className='aimsg '+p;m.textContent=t;aichat.appendChild(m);aichat.scrollTop=aichat.scrollHeight}
        function showType(){const d=document.createElement('div');d.className='aitype';d.id='aitype';d.innerHTML='<span></span><span></span><span></span>';aichat.appendChild(d);aichat.scrollTop=aichat.scrollHeight}
        function hideType(){const t=$('aitype');if(t)t.remove()}

        async function sendAI(){
            const t=aiinp.value.trim();if(!t)return;aiinp.value='';addMsg(t,'u');showType();aisend.disabled=true;
            try{
                const wm=t.match(/погода\s+в?\s*(.+)/i)||(t.toLowerCase().includes('погода')?['',t.replace(/погода\s*/i,'').trim()||'Москва']:null);
                if(wm){
                    const r=await fetch(`https://wttr.in/${encodeURIComponent(wm[1])}?format=j1&lang=ru`);
                    const d=await r.json();const c=d.current_condition[0];
                    hideType();addMsg(`🌤 ${wm[1]}: ${c.temp_C}°C, ${c.weatherDesc[0].value}, ветер ${c.windspeedKmph} км/ч, влажность ${c.humidity}%`,'b');
                    aisend.disabled=false;return;
                }
                const r=await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(t)}&format=json&no_html=1&t=gc`);
                const d=await r.json();hideType();
                if(d.AbstractText&&d.AbstractText.length>20)addMsg(d.AbstractText.substring(0,450)+(d.AbstractURL?'\n\n🔗 '+d.AbstractURL:''),'b');
                else if(d.RelatedTopics?.length>0){let a='Вот что нашлось:\n';d.RelatedTopics.slice(0,5).forEach((t,i)=>a+=`\n${i+1}. ${t.Text.split(' - ')[0].substring(0,100)}`);addMsg(a,'b')}
                else a
